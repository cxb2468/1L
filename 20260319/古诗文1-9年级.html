        .poem-title-line {

<script>
(function() {
    // ---------- 1-9年级古诗文（2026最新教材）完整数据 ----------
    const poemsByGrade = [
        // ---------- 小学 & 初中 篇目 ----------
        { grade: "一年级（上）", list: [
            { title: "咏鹅", author: "骆宾王", dynasty: "唐", lines: ["鹅，鹅，鹅，", "曲项向天歌。", "白毛浮绿水，", "红掌拨清波。"], translation: "鹅呀鹅，弯着脖子向天唱歌。白色的羽毛浮在绿水，红掌拨动清澈的水波。" },
            { title: "江南", author: "汉乐府", dynasty: "汉", lines: ["江南可采莲，", "莲叶何田田。", "鱼戏莲叶间。", "鱼戏莲叶东，", "鱼戏莲叶西，", "鱼戏莲叶南，", "鱼戏莲叶北。"], translation: "江南可以采莲，莲叶多么茂盛。鱼儿在莲叶间嬉戏。鱼在莲叶东边游，鱼在莲叶西边游，鱼在莲叶南边游，鱼在莲叶北边游。" },
            { title: "悯农·其二", author: "李绅", dynasty: "唐", lines: ["锄禾日当午，", "汗滴禾下土。", "谁知盘中餐，", "粒粒皆辛苦。"], translation: "中午锄草，汗水滴进泥土。谁知道盘中的饭食，每一粒都那么辛苦。" },
            { title: "古朗月行（节选）", author: "李白", dynasty: "唐", lines: ["小时不识月，", "呼作白玉盘。", "又疑瑶台镜，", "飞在青云端。"], translation: "小时候不认识月亮，叫它白玉盘。又怀疑是瑶台镜，飞在青云端。" },
            { title: "风", author: "李峤", dynasty: "唐", lines: ["解落三秋叶，", "能开二月花。", "过江千尺浪，", "入竹万竿斜。"], translation: "能吹落三秋的叶，能开出二月的花。过江掀起千尺浪，入竹万竿都倾斜。" },
            { title: "对韵歌", author: "佚名", dynasty: "清", lines: ["云对雨，雪对风。", "花对树，鸟对虫。", "山清对水秀，", "柳绿对桃红。"], translation: "云对雨，雪对风。花对树，鸟对虫。山清对水秀，柳绿对桃红。" },
            { title: "数字诗", author: "佚名", dynasty: "清", lines: ["一片两片三四片，", "五片六片七八片。", "九片十片无数片，", "飞入梅花总不见。"], translation: "一片两片三四片，五片六片七八片。九片十片无数片，飞入梅花总不见。" },
            { title: "一年之计在于春", author: "谚语", dynasty: "民", lines: ["一年之计在于春，", "一日之计在于晨。", "一寸光阴一寸金，", "寸金难买寸光阴。"], translation: "一年的计划在于春天，一天的计划在于早晨。一寸光阴一寸金，寸金难买寸光阴。" },
            { title: "方向歌", author: "童谣", dynasty: "民", lines: ["早晨起来，面向太阳。", "前面是东，后面是西。", "左面是北，右面是南。"], translation: "早晨起来，面向太阳。前面是东，后面是西。左面是北，右面是南。" },
            { title: "成语积累", author: "童蒙", dynasty: "民", lines: ["种瓜得瓜，种豆得豆。", "前人栽树，后人乘凉。", "千里之行，始于足下。", "百尺竿头，更进一步。"], translation: "种什么得什么，前人的付出让后人受益，走千里路要从脚下开始，不要满足现状要更进一步。" }
        ]},
        { grade: "一年级（下）", list: [
            { title: "春晓", author: "孟浩然", dynasty: "唐", lines: ["春眠不觉晓，", "处处闻啼鸟。", "夜来风雨声，", "花落知多少。"], translation: "春天贪睡不觉天亮，醒来处处听见鸟鸣。昨夜风雨交加，不知道花儿落了多少。" },
            { title: "赠汪伦", author: "李白", dynasty: "唐", lines: ["李白乘舟将欲行，", "忽闻岸上踏歌声。", "桃花潭水深千尺，", "不及汪伦送我情。"], translation: "我乘船将要远行，忽然听到岸上踏歌之声。桃花潭水纵然深千尺，也比不上汪伦送我的情意。" },
            { title: "静夜思", author: "李白", dynasty: "唐", lines: ["床前明月光，", "疑是地上霜。", "举头望明月，", "低头思故乡。"], translation: "床前洒满明亮的月光，好像是地上铺的秋霜。抬头仰望天上的月亮，低头思念自己的故乡。" },
            { title: "池上", author: "白居易", dynasty: "唐", lines: ["小娃撑小艇，", "偷采白莲回。", "不解藏踪迹，", "浮萍一道开。"], translation: "小孩子撑着小船，偷偷采了白莲回来。不懂得隐藏踪迹，浮萍被划开一道痕迹。" },
            { title: "小池", author: "杨万里", dynasty: "宋", lines: ["泉眼无声惜细流，", "树阴照水爱晴柔。", "小荷才露尖尖角，", "早有蜻蜓立上头。"], translation: "泉眼无声惜惜地流淌，树荫映照水面爱这晴柔。小荷叶刚露出尖角，早有蜻蜓停在上头。" },
            { title: "寻隐者不遇", author: "贾岛", dynasty: "唐", lines: ["松下问童子，", "言师采药去。", "只在此山中，", "云深不知处。"], translation: "松树下问童子，他说师父采药去了。就在这座山中，云雾深处不知在哪儿。" }
        ]},
        { grade: "二年级（上）", list: [
            { title: "敕勒歌", author: "北朝民歌", dynasty: "南北朝", lines: ["敕勒川，", "阴山下。", "天似穹庐，", "笼盖四野。", "天苍苍，", "野茫茫，", "风吹草低见牛羊。"], translation: "敕勒川，在阴山下。天像圆顶毡帐，笼罩着原野。天色苍苍，原野茫茫，风吹草低露出牛羊。" },
            { title: "登鹳雀楼", author: "王之涣", dynasty: "唐", lines: ["白日依山尽，", "黄河入海流。", "欲穷千里目，", "更上一层楼。"], translation: "太阳依山落下，黄河向海奔流。想要看得更远，就要再登一层楼。" },
            { title: "望庐山瀑布", author: "李白", dynasty: "唐", lines: ["日照香炉生紫烟，", "遥看瀑布挂前川。", "飞流直下三千尺，", "疑是银河落九天。"], translation: "香炉峰在阳光下生紫烟，远看瀑布挂在山前。飞流直下三千尺，疑似银河从九天落下。" },
            { title: "江雪", author: "柳宗元", dynasty: "唐", lines: ["千山鸟飞绝，", "万径人踪灭。", "孤舟蓑笠翁，", "独钓寒江雪。"], translation: "千山不见鸟影，万路不见人迹。孤舟上披蓑衣的老翁，独自在寒江雪中垂钓。" },
            { title: "梅花", author: "王安石", dynasty: "宋", lines: ["墙角数枝梅，", "凌寒独自开。", "遥知不是雪，", "为有暗香来。"], translation: "墙角有几枝梅花，冒着严寒独自盛开。远看就知道不是雪，因为有暗香飘来。" },
            { title: "小儿垂钓", author: "胡令能", dynasty: "唐", lines: ["蓬头稚子学垂纶，", "侧坐莓苔草映身。", "路人借问遥招手，", "怕得鱼惊不应人。"], translation: "蓬头小孩学钓鱼，侧坐莓苔草遮身。路人问路远远招手，怕鱼惊不应人。" }
        ]},
        { grade: "二年级（下）", list: [
            { title: "咏柳", author: "贺知章", dynasty: "唐", lines: ["碧玉妆成一树高，", "万条垂下绿丝绦。", "不知细叶谁裁出，", "二月春风似剪刀。"], translation: "高高的柳树像碧玉妆成，万条柳丝垂下绿丝带。不知细叶是谁裁出，二月春风像剪刀。" },
            { title: "晓出净慈寺送林子方", author: "杨万里", dynasty: "宋", lines: ["毕竟西湖六月中，", "风光不与四时同。", "接天莲叶无穷碧，", "映日荷花别样红。"], translation: "毕竟西湖六月中，风光不与四时同。接天莲叶无穷碧，映日荷花别样红。" },
            { title: "绝句", author: "杜甫", dynasty: "唐", lines: ["两个黄鹂鸣翠柳，", "一行白鹭上青天。", "窗含西岭千秋雪，", "门泊东吴万里船。"], translation: "两个黄鹂在翠柳中叫，一行白鹭飞上青天。窗外西岭的千年雪，门前停着东吴的万里船。" },
            { title: "村居", author: "高鼎", dynasty: "清", lines: ["草长莺飞二月天，", "拂堤杨柳醉春烟。", "儿童散学归来早，", "忙趁东风放纸鸢。"], translation: "草木生长黄莺飞舞的二月，杨柳拂堤陶醉在春烟里。儿童放学早早归来，赶忙趁着东风放风筝。" }
        ]},
        { grade: "三年级（上）", list: [
            { title: "早发白帝城", author: "李白", dynasty: "唐", lines: ["朝辞白帝彩云间，", "千里江陵一日还。", "两岸猿声啼不住，", "轻舟已过万重山。"], translation: "早晨告别彩云间的白帝城，千里外的江陵一天就能回。两岸猿声不断，轻舟已过万重山。" },
            { title: "望天门山", author: "李白", dynasty: "唐", lines: ["天门中断楚江开，", "碧水东流至此回。", "两岸青山相对出，", "孤帆一片日边来。"], translation: "天门山被长江断开，碧水东流到此回旋。两岸青山相对出，一片孤帆日边来。" },
            { title: "山行", author: "杜牧", dynasty: "唐", lines: ["远上寒山石径斜，", "白云生处有人家。", "停车坐爱枫林晚，", "霜叶红于二月花。"], translation: "沿着石径登上寒山，白云生处有人家。停车只因喜爱枫林晚景，霜叶比二月花还红。" },
            { title: "望洞庭", author: "刘禹锡", dynasty: "唐", lines: ["湖光秋月两相和，", "潭面无风镜未磨。", "遥望洞庭山水翠，", "白银盘里一青螺。"], translation: "湖光秋月两相和，潭面无风镜未磨。遥望洞庭山水翠，白银盘里一青螺。" },
            { title: "所见", author: "袁枚", dynasty: "清", lines: ["牧童骑黄牛，", "歌声振林樾。", "意欲捕鸣蝉，", "忽然闭口立。"], translation: "牧童骑在黄牛背上，歌声在树林里回荡。想要捕捉鸣叫的蝉，忽然闭口站立。" },
            { title: "饮湖上初晴后雨", author: "苏轼", dynasty: "宋", lines: ["水光潋滟晴方好，", "山色空蒙雨亦奇。", "欲把西湖比西子，", "淡妆浓抹总相宜。"], translation: "水光潋滟晴方好，山色空蒙雨也奇。想把西湖比西子，淡妆浓抹总相宜。" },
            { title: "夜书所见", author: "叶绍翁", dynasty: "宋", lines: ["萧萧梧叶送寒声，", "江上秋风动客情。", "知有儿童挑促织，", "夜深篱落一灯明。"], translation: "萧萧梧叶送寒声，江上秋风动客情。知道儿童在挑促织，夜深篱笆边一盏灯明。" }
        ]},
        { grade: "三年级（下）", list: [
            { title: "忆江南", author: "白居易", dynasty: "唐", lines: ["江南好，", "风景旧曾谙。", "日出江花红胜火，", "春来江水绿如蓝。", "能不忆江南？"], translation: "江南好，风景我过去很熟悉。日出江花红胜火，春来江水绿如蓝。怎能不回忆江南？" },
            { title: "元日", author: "王安石", dynasty: "宋", lines: ["爆竹声中一岁除，", "春风送暖入屠苏。", "千门万户曈曈日，", "总把新桃换旧符。"], translation: "爆竹声中一岁除，春风送暖入屠苏。千家万户曈曈日，总把新桃换旧符。" },
            { title: "绝句·迟日", author: "杜甫", dynasty: "唐", lines: ["迟日江山丽，", "春风花草香。", "泥融飞燕子，", "沙暖睡鸳鸯。"], translation: "春日的江山格外秀丽，春风吹来花草的芳香。泥土融化燕子衔泥飞舞，沙滩暖和对对鸳鸯静睡。" },
            { title: "九月九日忆山东兄弟", author: "王维", dynasty: "唐", lines: ["独在异乡为异客，", "每逢佳节倍思亲。", "遥知兄弟登高处，", "遍插茱萸少一人。"], translation: "独自在他乡做异客，每逢佳节加倍思亲。遥想兄弟们登高，都插着茱萸就少我一人。" },
            { title: "惠崇春江晚景", author: "苏轼", dynasty: "宋", lines: ["竹外桃花三两枝，", "春江水暖鸭先知。", "蒌蒿满地芦芽短，", "正是河豚欲上时。"], translation: "竹外桃花三两枝，春江水暖鸭先知。蒌蒿满地芦芽短，正是河豚欲上时。" },
            { title: "清明", author: "杜牧", dynasty: "唐", lines: ["清明时节雨纷纷，", "路上行人欲断魂。", "借问酒家何处有，", "牧童遥指杏花村。"], translation: "清明时节细雨纷纷，路上行人愁苦失魂。借问哪里有酒家？牧童遥指杏花村。" },
            { title: "滁州西涧", author: "韦应物", dynasty: "唐", lines: ["独怜幽草涧边生，", "上有黄鹂深树鸣。", "春潮带雨晚来急，", "野渡无人舟自横。"], translation: "最爱涧边幽草，树丛深处黄鹂鸣叫。春潮带雨晚上来得急，野渡无人小船自横。" },
            { title: "三衢道中", author: "曾几", dynasty: "宋", lines: ["梅子黄时日日晴，", "小溪泛尽却山行。", "绿阴不减来时路，", "添得黄鹂四五声。"], translation: "梅子黄时日日晴，小溪泛尽却山行。绿阴不减来时路，添得黄鹂四五声。" }
        ]},
        { grade: "四年级（上）", list: [
            { title: "鹿柴", author: "王维", dynasty: "唐", lines: ["空山不见人，", "但闻人语响。", "返景入深林，", "复照青苔上。"], translation: "空山看不见人，只听到人语声。落日的余晖照进深林，又照在青苔上。" },
            { title: "凉州词", author: "王翰", dynasty: "唐", lines: ["葡萄美酒夜光杯，", "欲饮琵琶马上催。", "醉卧沙场君莫笑，", "古来征战几人回？"], translation: "葡萄美酒夜光杯，正要畅饮琵琶马上催。醉卧沙场请你莫笑，古来出征有几人回？" },
            { title: "别董大", author: "高适", dynasty: "唐", lines: ["千里黄云白日曛，", "北风吹雁雪纷纷。", "莫愁前路无知己，", "天下谁人不识君？"], translation: "千里黄云白日曛，北风吹雁雪纷纷。莫愁前路无知己，天下谁人不识君。" },
            { title: "出塞", author: "王昌龄", dynasty: "唐", lines: ["秦时明月汉时关，", "万里长征人未还。", "但使龙城飞将在，", "不教胡马度阴山。"], translation: "依旧是秦汉时的明月边关，远征的人还没回来。只要龙城飞将军还在，就不让胡马越过阴山。" },
            { title: "题西林壁", author: "苏轼", dynasty: "宋", lines: ["横看成岭侧成峰，", "远近高低各不同。", "不识庐山真面目，", "只缘身在此山中。"], translation: "横看是岭侧看是峰，远近高低各不同。不识庐山真面目，只因为身在此山中。" },
            { title: "浪淘沙", author: "刘禹锡", dynasty: "唐", lines: ["九曲黄河万里沙，", "浪淘风簸自天涯。", "如今直上银河去，", "同到牵牛织女家。"], translation: "九曲黄河万里沙，浪淘风簸自天涯。如今直上银河去，同到牵牛织女家。" },
            { title: "夏日绝句", author: "李清照", dynasty: "宋", lines: ["生当作人杰，", "死亦为鬼雄。", "至今思项羽，", "不肯过江东。"], translation: "活着应当做人杰，死了也是鬼雄。至今思念项羽，不肯回到江东。" },
            { title: "暮江吟", author: "白居易", dynasty: "唐", lines: ["一道残阳铺水中，", "半江瑟瑟半江红。", "可怜九月初三夜，", "露似真珠月似弓。"], translation: "一道残阳铺水中，半江瑟瑟半江红。最可爱九月初三夜，露似珍珠月似弓。" },
            { title: "嫦娥", author: "李商隐", dynasty: "唐", lines: ["云母屏风烛影深，", "长河渐落晓星沉。", "嫦娥应悔偷灵药，", "碧海青天夜夜心。"], translation: "云母屏风烛影深，长河渐落晓星沉。嫦娥应该后悔偷灵药，碧海青天夜夜心。" }
        ]},
        { grade: "四年级（下）", list: [
            { title: "宿新市徐公店", author: "杨万里", dynasty: "宋", lines: ["篱落疏疏一径深，", "树头花落未成阴。", "儿童急走追黄蝶，", "飞入菜花无处寻。"], translation: "篱笆稀疏小径深，树头花落未成阴。儿童跑着追黄蝶，飞入菜花无处寻。" },
            { title: "四时田园杂兴·其三十一", author: "范成大", dynasty: "宋", lines: ["昼出耘田夜绩麻，", "村庄儿女各当家。", "童孙未解供耕织，", "也傍桑阴学种瓜。"], translation: "白天耘田晚上搓麻，村庄儿女各自当家。小孙子不懂耕织，也在桑阴下学种瓜。" },
            { title: "清平乐·村居", author: "辛弃疾", dynasty: "宋", lines: ["茅檐低小，", "溪上青青草。", "醉里吴音相媚好，", "白发谁家翁媪？", "大儿锄豆溪东，", "中儿正织鸡笼。", "最喜小儿亡赖，", "溪头卧剥莲蓬。"], translation: "茅檐低小，溪上青青草。醉里吴音相媚好，白发谁家翁媪？大儿锄豆溪东，中儿正织鸡笼。最喜小儿顽皮，溪头卧剥莲蓬。" },
            { title: "塞下曲", author: "卢纶", dynasty: "唐", lines: ["月黑雁飞高，", "单于夜遁逃。", "欲将轻骑逐，", "大雪满弓刀。"], translation: "月黑雁飞高，单于夜遁逃。欲将轻骑逐，大雪满弓刀。" },
            { title: "墨梅", author: "王冕", dynasty: "元", lines: ["吾家洗砚池头树，", "朵朵花开淡墨痕。", "不要人夸好颜色，", "只留清气满乾坤。"], translation: "我家洗砚池边树，朵朵花开淡墨痕。不要人夸好颜色，只留清气满乾坤。" },
            { title: "蜂", author: "罗隐", dynasty: "唐", lines: ["不论平地与山尖，", "无限风光尽被占。", "采得百花成蜜后，", "为谁辛苦为谁甜？"], translation: "不论平地与山尖，无限风光尽被占。采得百花成蜜后，为谁辛苦为谁甜？" },
            { title: "芙蓉楼送辛渐", author: "王昌龄", dynasty: "唐", lines: ["寒雨连江夜入吴，", "平明送客楚山孤。", "洛阳亲友如相问，", "一片冰心在玉壶。"], translation: "寒雨连江夜入吴，天亮送客楚山孤。洛阳亲友如相问，就说我心像玉壶里的冰一样纯洁。" },
            { title: "独坐敬亭山", author: "李白", dynasty: "唐", lines: ["众鸟高飞尽，", "孤云独去闲。", "相看两不厌，", "只有敬亭山。"], translation: "鸟儿高飞远去，孤云独自悠闲。和我相看不厌的，只有敬亭山。" }
        ]},
        { grade: "五年级（上）", list: [
            { title: "黄鹤楼送孟浩然之广陵", author: "李白", dynasty: "唐", lines: ["故人西辞黄鹤楼，", "烟花三月下扬州。", "孤帆远影碧空尽，", "唯见长江天际流。"], translation: "老朋友告别黄鹤楼，在三月下扬州。孤帆远影消失在碧空，只见长江向天边流。" },
            { title: "渔歌子", author: "张志和", dynasty: "唐", lines: ["西塞山前白鹭飞，", "桃花流水鳜鱼肥。", "青箬笠，绿蓑衣，", "斜风细雨不须归。"], translation: "西塞山前白鹭飞，桃花流水鳜鱼肥。青箬笠，绿蓑衣，斜风细雨不须归。" },
            { title: "枫桥夜泊", author: "张继", dynasty: "唐", lines: ["月落乌啼霜满天，", "江枫渔火对愁眠。", "姑苏城外寒山寺，", "夜半钟声到客船。"], translation: "月落乌鸦啼叫霜满天，对着江枫渔火愁眠。姑苏城外的寒山寺，半夜钟声传到客船。" },
            { title: "题临安邸", author: "林升", dynasty: "宋", lines: ["山外青山楼外楼，", "西湖歌舞几时休？", "暖风熏得游人醉，", "直把杭州作汴州。"], translation: "山外青山楼外楼，西湖歌舞几时休？暖风熏得游人醉，直把杭州作汴州。" },
            { title: "示儿", author: "陆游", dynasty: "宋", lines: ["死去元知万事空，", "但悲不见九州同。", "王师北定中原日，", "家祭无忘告乃翁。"], translation: "死去本知万事空，只悲不见九州同。王师北定中原日，家祭勿忘告乃翁。" },
            { title: "己亥杂诗", author: "龚自珍", dynasty: "清", lines: ["九州生气恃风雷，", "万马齐喑究可哀。", "我劝天公重抖擞，", "不拘一格降人才。"], translation: "九州生气靠风雷，万马齐喑真可哀。我劝天公重抖擞，不拘一格降人才。" },
            { title: "观书有感·其一", author: "朱熹", dynasty: "宋", lines: ["半亩方塘一鉴开，", "天光云影共徘徊。", "问渠那得清如许？", "为有源头活水来。"], translation: "半亩方塘像镜子打开，天光云影共徘徊。问它怎能这么清，因为有源头活水来。" },
            { title: "观书有感·其二", author: "朱熹", dynasty: "宋", lines: ["昨夜江边春水生，", "蒙冲巨舰一毛轻。", "向来枉费推移力，", "此日中流自在行。"], translation: "昨夜江边春水生，蒙冲巨舰一毛轻。向来枉费推移力，此日中流自在行。" },
            { title: "乞巧", author: "林杰", dynasty: "唐", lines: ["七夕今宵看碧霄，", "牵牛织女渡河桥。", "家家乞巧望秋月，", "穿尽红丝几万条。"], translation: "七夕今宵看碧霄，牵牛织女渡河桥。家家乞巧望秋月，穿尽红丝几万条。" },
            { title: "长相思", author: "纳兰性德", dynasty: "清", lines: ["山一程，水一程，", "身向榆关那畔行，", "夜深千帐灯。", "风一更，雪一更，", "聒碎乡心梦不成，", "故园无此声。"], translation: "山一程，水一程，身向榆关那畔行，夜深千帐灯。风一更，雪一更，聒碎乡心梦不成，故园无此声。" }
        ]},
        { grade: "五年级（下）", list: [
            { title: "游子吟", author: "孟郊", dynasty: "唐", lines: ["慈母手中线，", "游子身上衣。", "临行密密缝，", "意恐迟迟归。", "谁言寸草心，", "报得三春晖。"], translation: "慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁说小草的心，能报答三春阳光。" },
            { title: "送元二使安西", author: "王维", dynasty: "唐", lines: ["渭城朝雨浥轻尘，", "客舍青青柳色新。", "劝君更尽一杯酒，", "西出阳关无故人。"], translation: "渭城朝雨润湿轻尘，客舍青青柳色新。劝你再喝一杯酒，西出阳关就没有老朋友了。" },
            { title: "乡村四月", author: "翁卷", dynasty: "宋", lines: ["绿遍山原白满川，", "子规声里雨如烟。", "乡村四月闲人少，", "才了蚕桑又插田。"], translation: "绿遍山原白满川，子规声里雨如烟。乡村四月闲人少，才了蚕桑又插田。" },
            { title: "凉州词", author: "王之涣", dynasty: "唐", lines: ["黄河远上白云间，", "一片孤城万仞山。", "羌笛何须怨杨柳，", "春风不度玉门关。"], translation: "黄河远远流入白云，一座孤城在万仞山中。羌笛何必怨杨柳，春风从来吹不到玉门关。" },
            { title: "秋夜将晓出篱门迎凉有感", author: "陆游", dynasty: "宋", lines: ["三万里河东入海，", "五千仞岳上摩天。", "遗民泪尽胡尘里，", "南望王师又一年。"], translation: "三万里河东入海，五千仞岳上摩天。遗民泪尽胡尘里，南望王师又一年。" },
            { title: "从军行", author: "王昌龄", dynasty: "唐", lines: ["青海长云暗雪山，", "孤城遥望玉门关。", "黄沙百战穿金甲，", "不破楼兰终不还。"], translation: "青海长云暗雪山，孤城遥望玉门关。黄沙百战穿金甲，不破楼兰终不还。" },
            { title: "鸟鸣涧", author: "王维", dynasty: "唐", lines: ["人闲桂花落，", "夜静春山空。", "月出惊山鸟，", "时鸣春涧中。"], translation: "人闲桂花飘落，夜静春山空。月亮出来惊动山鸟，不时在春涧中鸣叫。" }
        ]},
        { grade: "六年级（上）", list: [
            { title: "六月二十七日望湖楼醉书", author: "苏轼", dynasty: "宋", lines: ["黑云翻墨未遮山，", "白雨跳珠乱入船。", "卷地风来忽吹散，", "望湖楼下水如天。"], translation: "黑云如墨未遮山，白雨跳珠乱入船。卷地风来忽吹散，望湖楼下水如天。" },
            { title: "春日", author: "朱熹", dynasty: "宋", lines: ["胜日寻芳泗水滨，", "无边光景一时新。", "等闲识得东风面，", "万紫千红总是春。"], translation: "胜日寻芳泗水滨，无边光景一时新。等闲识得东风面，万紫千红总是春。" },
            { title: "江南春", author: "杜牧", dynasty: "唐", lines: ["千里莺啼绿映红，", "水村山郭酒旗风。", "南朝四百八十寺，", "多少楼台烟雨中。"], translation: "千里莺啼绿映红，水村山郭酒旗风。南朝四百八十寺，多少楼台烟雨中。" },
            { title: "回乡偶书", author: "贺知章", dynasty: "唐", lines: ["少小离家老大回，", "乡音无改鬓毛衰。", "儿童相见不相识，", "笑问客从何处来。"], translation: "年少离开家乡老了才回，乡音没变鬓发已白。儿童看见不认识，笑问客人从哪里来。" },
            { title: "宿建德江", author: "孟浩然", dynasty: "唐", lines: ["移舟泊烟渚，", "日暮客愁新。", "野旷天低树，", "江清月近人。"], translation: "把小船停靠在烟雾弥漫的沙洲，傍晚时分新愁又涌上心头。原野无边无际天比树还低，江水清清明月更亲近人。" }
        ]},
        { grade: "六年级（下）", list: [
            { title: "江上渔者", author: "范仲淹", dynasty: "宋", lines: ["江上往来人，", "但爱鲈鱼美。", "君看一叶舟，", "出没风波里。"], translation: "江上来往的人，只爱鲈鱼鲜美。你看那一叶小舟，在风波里出没。" },
            { title: "石灰吟", author: "于谦", dynasty: "明", lines: ["千锤万凿出深山，", "烈火焚烧若等闲。", "粉身碎骨浑不怕，", "要留清白在人间。"], translation: "千锤万凿出深山，烈火焚烧若等闲。粉身碎骨全不怕，要留清白在人间。" },
            { title: "游园不值", author: "叶绍翁", dynasty: "宋", lines: ["应怜屐齿印苍苔，", "小扣柴扉久不开。", "春色满园关不住，", "一枝红杏出墙来。"], translation: "应怜屐齿印苍苔，轻敲柴门久不开。春色满园关不住，一枝红杏出墙来。" },
            { title: "竹石", author: "郑燮", dynasty: "清", lines: ["咬定青山不放松，", "立根原在破岩中。", "千磨万击还坚劲，", "任尔东西南北风。"], translation: "咬定青山不放松，立根原在破岩中。千磨万击还坚劲，任尔东西南北风。" },
            { title: "泊船瓜洲", author: "王安石", dynasty: "宋", lines: ["京口瓜洲一水间，", "钟山只隔数重山。", "春风又绿江南岸，", "明月何时照我还？"], translation: "京口瓜洲一水间，钟山只隔数重山。春风又吹绿江南岸，明月何时照我回。" },
            { title: "春夜喜雨", author: "杜甫", dynasty: "唐", lines: ["好雨知时节，", "当春乃发生。", "随风潜入夜，", "润物细无声。", "野径云俱黑，", "江船火独明。", "晓看红湿处，", "花重锦官城。"], translation: "好雨知时节，当春乃发生。随风潜入夜，润物细无声。野径云俱黑，江船火独明。晓看红湿处，花重锦官城。" },
            { title: "长歌行", author: "汉乐府", dynasty: "汉", lines: ["青青园中葵，", "朝露待日晞。", "阳春布德泽，", "万物生光辉。", "常恐秋节至，", "焜黄华叶衰。", "百川东到海，", "何时复西归？", "少壮不努力，", "老大徒伤悲！"], translation: "园中葵菜青青，朝露等待阳光。春天布施恩泽，万物焕发光彩。常怕秋天来到，花叶枯黄衰败。百川东流入海，何时能再西归？少年不努力，老大只能徒自伤悲。" },
            { title: "闻官军收河南河北", author: "杜甫", dynasty: "唐", lines: ["剑外忽传收蓟北，", "初闻涕泪满衣裳。", "却看妻子愁何在，", "漫卷诗书喜欲狂。", "白日放歌须纵酒，", "青春作伴好还乡。", "即从巴峡穿巫峡，", "便下襄阳向洛阳。"], translation: "剑外忽然传收蓟北，初闻涕泪满衣裳。回头看妻子愁何在，漫卷诗书喜欲狂。白日放歌须纵酒，青春作伴好还乡。即从巴峡穿巫峡，便下襄阳向洛阳。" },
            { title: "寒食", author: "韩翃", dynasty: "唐", lines: ["春城无处不飞花，", "寒食东风御柳斜。", "日暮汉宫传蜡烛，", "轻烟散入五侯家。"], translation: "春城无处不飞花，寒食东风御柳斜。日暮汉宫传蜡烛，轻烟散入五侯家。" },
            { title: "马诗", author: "李贺", dynasty: "唐", lines: ["大漠沙如雪，", "燕山月似钩。", "何当金络脑，", "快走踏清秋。"], translation: "大漠沙如雪，燕山月似钩。何当金络脑，快走踏清秋。" },
            { title: "采薇（节选）", author: "诗经·小雅", dynasty: "周", lines: ["昔我往矣，", "杨柳依依。", "今我来思，", "雨雪霏霏。", "行道迟迟，", "载渴载饥。", "我心伤悲，", "莫知我哀！"], translation: "当初离家时，杨柳依依。如今归来时，大雪纷飞。道路泥泞缓慢，又渴又饥。我心伤悲，无人知道我的哀愁！" },
            { title: "早春呈水部张十八员外", author: "韩愈", dynasty: "唐", lines: ["天街小雨润如酥，", "草色遥看近却无。", "最是一年春好处，", "绝胜烟柳满皇都。"], translation: "天街小雨润如酥，草色遥看近却无。最是一年春好处，绝胜烟柳满皇都。" }
        ]},
        { grade: "七年级（上）", list: [
            { title: "观沧海", author: "曹操", dynasty: "东汉", lines: ["东临碣石，以观沧海。", "水何澹澹，山岛竦峙。", "树木丛生，百草丰茂。", "秋风萧瑟，洪波涌起。", "日月之行，若出其中；", "星汉灿烂，若出其里。", "幸甚至哉，歌以咏志。"], translation: "东行登上碣石山，来观赏大海。海水多么宽阔，山岛高高耸立。树木丛生，百草丰茂。秋风萧瑟，洪波涌起。日月运行，好像出于大海之中；银河灿烂，好像出自大海里。庆幸得很，用诗歌来歌咏志向。" },
            { title: "闻王昌龄左迁龙标遥有此寄", author: "李白", dynasty: "唐", lines: ["杨花落尽子规啼，", "闻道龙标过五溪。", "我寄愁心与明月，", "随君直到夜郎西。"], translation: "杨花落尽子规啼，听说你被贬龙标过五溪。我把愁心寄给明月，随风直到夜郎西。" },
            { title: "次北固山下", author: "王湾", dynasty: "唐", lines: ["客路青山外，", "行舟绿水前。", "潮平两岸阔，", "风正一帆悬。", "海日生残夜，", "江春入旧年。", "乡书何处达？", "归雁洛阳边。"], translation: "旅途在青山外，行船在绿水前。潮水平两岸更宽，风顺一帆高悬。海日生于残夜，江春闯入旧年。家书寄到哪里？归雁飞到洛阳边。" },
            { title: "天净沙·秋思", author: "马致远", dynasty: "元", lines: ["枯藤老树昏鸦，", "小桥流水人家，", "古道西风瘦马。", "夕阳西下，", "断肠人在天涯。"], translation: "枯藤缠绕的老树上栖息着黄昏归巢的乌鸦，小桥下流水潺潺，旁边有几户人家。在古老荒凉的道路上，秋风萧瑟，一匹疲惫的瘦马驮着我前行。夕阳向西缓缓落下，极度忧伤的旅人还漂泊在天涯。" },
            { title: "峨眉山月歌", author: "李白", dynasty: "唐", lines: ["峨眉山月半轮秋，", "影入平羌江水流。", "夜发清溪向三峡，", "思君不见下渝州。"], translation: "峨眉山月半轮秋，影入平羌江水流。夜发清溪向三峡，思君不见下渝州。" },
            { title: "江南逢李龟年", author: "杜甫", dynasty: "唐", lines: ["岐王宅里寻常见，", "崔九堂前几度闻。", "正是江南好风景，", "落花时节又逢君。"], translation: "岐王宅里常常见，崔九堂前几次闻。正是江南好风景，落花时节又逢君。" },
            { title: "行军九日思长安故园", author: "岑参", dynasty: "唐", lines: ["强欲登高去，", "无人送酒来。", "遥怜故园菊，", "应傍战场开。"], translation: "勉强想登高，无人送酒来。遥怜故园菊，应傍战场开。" },
            { title: "夜上受降城闻笛", author: "李益", dynasty: "唐", lines: ["回乐峰前沙似雪，", "受降城外月如霜。", "不知何处吹芦管，", "一夜征人尽望乡。"], translation: "回乐峰前沙似雪，受降城外月如霜。不知何处吹芦管，一夜征人尽望乡。" },
            { title: "秋词", author: "刘禹锡", dynasty: "唐", lines: ["自古逢秋悲寂寥，", "我言秋日胜春朝。", "晴空一鹤排云上，", "便引诗情到碧霄。"], translation: "自古逢秋悲寂寥，我言秋日胜春朝。晴空一鹤排云上，便引诗情到碧霄。" },
            { title: "夜雨寄北", author: "李商隐", dynasty: "唐", lines: ["君问归期未有期，", "巴山夜雨涨秋池。", "何当共剪西窗烛，", "却话巴山夜雨时。"], translation: "你问归期未有期，巴山夜雨涨秋池。何时共剪西窗烛，却话巴山夜雨时。" },
            { title: "十一月四日风雨大作", author: "陆游", dynasty: "宋", lines: ["僵卧孤村不自哀，", "尚思为国戍轮台。", "夜阑卧听风吹雨，", "铁马冰河入梦来。"], translation: "僵卧孤村不自哀，还想着为国守边。深夜躺着听风雨，铁马冰河入梦来。" },
            { title: "潼关", author: "谭嗣同", dynasty: "清", lines: ["终古高云簇此城，", "秋风吹散马蹄声。", "河流大野犹嫌束，", "山入潼关不解平。"], translation: "终古高云簇此城，秋风吹散马蹄声。河流大野犹嫌束，山入潼关不解平。" },
            { title: "《论语》十二章", author: "孔子弟子", dynasty: "春秋", lines: ["子曰：“学而时习之，不亦说乎？有朋自远方来，不亦乐乎？人不知而不愠，不亦君子乎？”","曾子曰：“吾日三省吾身：为人谋而不忠乎？与朋友交而不信乎？传不习乎？”","子曰：“吾十有五而志于学，三十而立，四十而不惑，五十而知天命，六十而耳顺，七十而从心所欲，不逾矩。”","子曰：“温故而知新，可以为师矣。”","子曰：“学而不思则罔，思而不学则殆。”","子曰：“贤哉，回也！一箪食，一瓢饮，在陋巷，人不堪其忧，回也不改其乐。贤哉，回也！”","子曰：“知之者不如好之者，好之者不如乐之者。”","子曰：“饭疏食，饮水，曲肱而枕之，乐亦在其中矣。不义而富且贵，于我如浮云。”","子曰：“三人行，必有我师焉。择其善者而从之，其不善者而改之。”","子在川上曰：“逝者如斯夫，不舍昼夜。”","子曰：“三军可夺帅也，匹夫不可夺志也。”","子夏曰：“博学而笃志，切问而近思，仁在其中矣。”"], translation: "孔子说：“学了又时常温习，不是很愉快吗？有志同道合的人从远方来，不是很令人高兴的吗？人家不了解我，我也不怨恨、恼怒，不也是一个有德的君子吗？” 曾子说：“我每天多次反省自己：为别人办事是不是尽心了呢？与朋友交往是不是做到诚实了呢？老师传授给我的学业是不是复习了呢？” 孔子说：“我十五岁立志学习，三十岁能自立，四十岁不迷惑，五十岁知天命，六十岁能听进各种意见，七十岁随心所欲而不越规矩。” 孔子说：“温习旧知识从而得知新知识，可以凭借这点做老师了。” 孔子说：“只读书不思考就会迷惑，只空想不读书就会疑惑。” 孔子说：“颜回多么贤德啊！一箪饭，一瓢水，住在简陋小巷，别人受不了那种忧愁，颜回却不改他的快乐。多么贤德啊！” 孔子说：“懂得它的人不如爱好它的人，爱好它的人不如以它为乐的人。” 孔子说：“吃粗粮，喝冷水，弯着胳膊做枕头，乐趣也就在其中了。不义而富且贵，对我来说像浮云一样。” 孔子说：“几个人一起走路，其中一定有可以当我老师的人。选择他们的优点去学习，看出那些不良方面就要改正。” 孔子在河边说：“流逝的时光就像这河水一样，日夜不停！” 孔子说：“三军可以夺去主帅，匹夫不可夺去志向。” 子夏说：“博学而志向坚定，恳切提问而思考当前，仁德就在其中了。”" },
            { title: "诫子书", author: "诸葛亮", dynasty: "三国", lines: ["夫君子之行，静以修身，俭以养德。非淡泊无以明志，非宁静无以致远。夫学须静也，才须学也，非学无以广才，非志无以成学。淫慢则不能励精，险躁则不能治性。年与时驰，意与日去，遂成枯落，多不接世，悲守穷庐，将复何及！"], translation: "君子的行为，以宁静来修养身心，以节俭来培养品德。不能淡泊就无法明确志向，不能宁静就无法达到高远。学习必须宁静，才干必须学习，不学习无法增长才干，没有志向无法完成学业。放纵就不能振奋精神，急躁就不能陶冶性情。年华随时光飞驰，意志随岁月消逝，最终枯落，大多不能接触社会，可悲地守着穷家，将来怎么来得及！" }
        ]},
        { grade: "七年级（下）", list: [
            { title: "木兰诗", author: "北朝民歌", dynasty: "南北朝", lines: ["唧唧复唧唧，木兰当户织。不闻机杼声，唯闻女叹息。","问女何所思，问女何所忆。女亦无所思，女亦无所忆。","昨夜见军帖，可汗大点兵，军书十二卷，卷卷有爷名。","阿爷无大儿，木兰无长兄，愿为市鞍马，从此替爷征。","东市买骏马，西市买鞍鞯，南市买辔头，北市买长鞭。","旦辞爷娘去，暮宿黄河边，不闻爷娘唤女声，但闻黄河流水鸣溅溅。","旦辞黄河去，暮至黑山头，不闻爷娘唤女声，但闻燕山胡骑鸣啾啾。","万里赴戎机，关山度若飞。朔气传金柝，寒光照铁衣。将军百战死，壮士十年归。","归来见天子，天子坐明堂。策勋十二转，赏赐百千强。","可汗问所欲，木兰不用尚书郎，愿驰千里足，送儿还故乡。","爷娘闻女来，出郭相扶将；阿姊闻妹来，当户理红妆；小弟闻姊来，磨刀霍霍向猪羊。","开我东阁门，坐我西阁床，脱我战时袍，著我旧时裳。","当窗理云鬓，对镜帖花黄。出门看火伴，火伴皆惊忙：同行十二年，不知木兰是女郎。","雄兔脚扑朔，雌兔眼迷离；双兔傍地走，安能辨我是雄雌？"], translation: "叹息声一声接一声，木兰对着门织布。听不到织布声，只听见女儿叹息。问女儿想什么，问女儿忆什么。女儿没想什么，女儿没忆什么。昨夜看见军帖，可汗大征兵，军书很多卷，卷卷有父亲名字。父亲没大儿子，木兰没大哥哥，愿意去买鞍马，从此替父出征。东市买骏马，西市买鞍鞯，南市买辔头，北市买长鞭。早晨辞别爹娘，晚上住在黄河边，听不到爹娘呼唤女儿声，只听到黄河流水声溅溅。早晨离开黄河，晚上到达黑山，听不到爹娘呼唤女儿声，只听到燕山胡马声啾啾。远行万里赴战场，飞越关山。北方的寒气传着打更声，月光照着铁衣。将军百战死，壮士十年归。回来见天子，天子坐明堂。记功多次，赏赐很多。可汗问要什么，木兰不要尚书郎，愿骑千里马，送儿回故乡。爹娘听说女儿回，互相搀扶出城外；姐姐听说妹妹回，对着门梳妆；小弟听说姐姐回，磨刀霍霍向猪羊。打开我东阁门，坐我西阁床，脱我战时袍，穿我旧衣裳。对着窗理云鬓，对镜贴花黄。出门见伙伴，伙伴都惊慌：同行十二年，不知木兰是女郎。雄兔脚扑朔，雌兔眼迷离；两兔傍地跑，怎能辨我是雄雌？" },
            { title: "竹里馆", author: "王维", dynasty: "唐", lines: ["独坐幽篁里，", "弹琴复长啸。", "深林人不知，", "明月来相照。"], translation: "独自坐在幽静的竹林里，弹琴又长啸。深林无人知晓，只有明月来照耀。" },
            { title: "春夜洛城闻笛", author: "李白", dynasty: "唐", lines: ["谁家玉笛暗飞声，", "散入春风满洛城。", "此夜曲中闻折柳，", "何人不起故园情。"], translation: "谁家的玉笛暗暗飘出声音，随着春风飘满洛阳城。今夜听到《折杨柳》的曲子，谁不会涌起思乡之情。" },
            { title: "逢入京使", author: "岑参", dynasty: "唐", lines: ["故园东望路漫漫，", "双袖龙钟泪不干。", "马上相逢无纸笔，", "凭君传语报平安。"], translation: "向东望故乡路途漫漫，双袖湿透泪不干。马上相逢没有纸笔，请你带话报个平安。" },
            { title: "晚春", author: "韩愈", dynasty: "唐", lines: ["草树知春不久归，", "百般红紫斗芳菲。", "杨花榆荚无才思，", "惟解漫天作雪飞。"], translation: "草树知道春天不久归，百般红紫争芳菲。杨花榆荚无才思，只知道漫天作雪飞。" },
            { title: "登幽州台歌", author: "陈子昂", dynasty: "唐", lines: ["前不见古人，", "后不见来者。", "念天地之悠悠，", "独怆然而涕下。"], translation: "往前看不见古代的先贤，往后看不到后来的俊杰。想到天地之广阔悠久，独自悲伤流泪。" },
            { title: "望岳", author: "杜甫", dynasty: "唐", lines: ["岱宗夫如何？", "齐鲁青未了。", "造化钟神秀，", "阴阳割昏晓。", "荡胸生曾云，", "决眦入归鸟。", "会当凌绝顶，", "一览众山小。"], translation: "泰山怎么样？横跨齐鲁青翠不断。大自然把神奇都给它，山南山北分出昏晓。层云升腾荡涤心胸，极目远眺归鸟入山。一定要登上顶峰，俯瞰群山都变小。" },
            { title: "登飞来峰", author: "王安石", dynasty: "宋", lines: ["飞来山上千寻塔，", "闻说鸡鸣见日升。", "不畏浮云遮望眼，", "自缘身在最高层。"], translation: "飞来山上千寻塔，听说鸡鸣见日升。不怕浮云遮望眼，只因为身在最高层。" },
            { title: "游山西村", author: "陆游", dynasty: "宋", lines: ["莫笑农家腊酒浑，", "丰年留客足鸡豚。", "山重水复疑无路，", "柳暗花明又一村。", "箫鼓追随春社近，", "衣冠简朴古风存。", "从今若许闲乘月，", "拄杖无时夜叩门。"], translation: "莫笑农家腊酒浑，丰年留客足鸡豚。山重水复疑无路，柳暗花明又一村。箫鼓追随春社近，衣冠简朴古风存。从今若许闲乘月，拄杖无时夜叩门。" },
            { title: "己亥杂诗", author: "龚自珍", dynasty: "清", lines: ["浩荡离愁白日斜，", "吟鞭东指即天涯。", "落红不是无情物，", "化作春泥更护花。"], translation: "浩荡离愁白日斜，吟鞭东指即天涯。落红不是无情物，化作春泥更护花。" },
            { title: "泊秦淮", author: "杜牧", dynasty: "唐", lines: ["烟笼寒水月笼沙，", "夜泊秦淮近酒家。", "商女不知亡国恨，", "隔江犹唱后庭花。"], translation: "烟笼寒水月笼沙，夜泊秦淮近酒家。商女不知亡国恨，隔江犹唱后庭花。" },
            { title: "贾生", author: "李商隐", dynasty: "唐", lines: ["宣室求贤访逐臣，", "贾生才调更无伦。", "可怜夜半虚前席，", "不问苍生问鬼神。"], translation: "宣室求贤访逐臣，贾生才调更无伦。可怜夜半虚前席，不问苍生问鬼神。" },
            { title: "过松源晨炊漆公店", author: "杨万里", dynasty: "宋", lines: ["莫言下岭便无难，", "赚得行人错喜欢。", "政入万山围子里，", "一山放出一山拦。"], translation: "莫言下岭便无难，赚得行人错喜欢。政入万山围子里，一山放出一山拦。" },
            { title: "约客", author: "赵师秀", dynasty: "宋", lines: ["黄梅时节家家雨，", "青草池塘处处蛙。", "有约不来过夜半，", "闲敲棋子落灯花。"], translation: "黄梅时节家家雨，青草池塘处处蛙。有约不来过夜半，闲敲棋子落灯花。" },
            { title: "陋室铭", author: "刘禹锡", dynasty: "唐", lines: ["山不在高，有仙则名。", "水不在深，有龙则灵。", "斯是陋室，惟吾德馨。", "苔痕上阶绿，草色入帘青。", "谈笑有鸿儒，往来无白丁。", "可以调素琴，阅金经。", "无丝竹之乱耳，无案牍之劳形。", "南阳诸葛庐，西蜀子云亭。", "孔子云：何陋之有？"], translation: "山不在高，有仙就出名。水不在深，有龙就有灵。这是简陋的屋子，只因我的品德芬芳。苔痕上阶绿，草色入帘青。谈笑有博学的学者，往来没有平民。可以弹琴，读佛经。没有丝竹乱耳，没有公文劳形。南阳诸葛庐，西蜀子云亭。孔子说：有什么简陋呢？" },
            { title: "爱莲说", author: "周敦颐", dynasty: "宋", lines: ["水陆草木之花，可爱者甚蕃。晋陶渊明独爱菊。自李唐来，世人甚爱牡丹。予独爱莲之出淤泥而不染，濯清涟而不妖，中通外直，不蔓不枝，香远益清，亭亭净植，可远观而不可亵玩焉。","予谓菊，花之隐逸者也；牡丹，花之富贵者也；莲，花之君子者也。噫！菊之爱，陶后鲜有闻。莲之爱，同予者何人？牡丹之爱，宜乎众矣！"], translation: "水上陆上草本木本的花，可爱的很多。晋陶渊明独爱菊。自唐朝以来，世人很爱牡丹。我独爱莲出淤泥而不染，在清水中洗过而不妖艳，中间通外面直，不牵蔓不分支，香越远越清，亭亭直立，可远观而不可轻慢玩弄。我认为菊是花中隐士，牡丹是花中富贵者，莲是花中君子。唉！爱菊的，陶以后很少听到。爱莲的，像我还有谁呢？爱牡丹的，当然很多了！" }
        ]},
        { grade: "八年级（上）", list: [
            { title: "野望", author: "王绩", dynasty: "唐", lines: ["东皋薄暮望，", "徙倚欲何依。", "树树皆秋色，", "山山唯落晖。", "牧人驱犊返，", "猎马带禽归。", "相顾无相识，", "长歌怀采薇。"], translation: "东皋傍晚眺望，徘徊无所依。树树都染秋色，山山只有落日。牧人赶牛回，猎马带禽归。相看不相识，长歌怀采薇。" },
            { title: "黄鹤楼", author: "崔颢", dynasty: "唐", lines: ["昔人已乘黄鹤去，", "此地空余黄鹤楼。", "黄鹤一去不复返，", "白云千载空悠悠。", "晴川历历汉阳树，", "芳草萋萋鹦鹉洲。", "日暮乡关何处是？", "烟波江上使人愁。"], translation: "昔人已乘黄鹤去，此地空余黄鹤楼。黄鹤一去不复返，白云千载空悠悠。晴日里汉阳树木历历可见，芳草茂盛覆盖鹦鹉洲。日暮时故乡在何处？江上烟波使人愁。" },
            { title: "使至塞上", author: "王维", dynasty: "唐", lines: ["单车欲问边，", "属国过居延。", "征蓬出汉塞，", "归雁入胡天。", "大漠孤烟直，", "长河落日圆。", "萧关逢候骑，", "都护在燕然。"], translation: "轻车去边关，经过居延。像蓬草出塞，似归雁入胡天。大漠孤烟直，长河落日圆。在萧关遇到侦察兵，说都护在燕然。" },
            { title: "渡荆门送别", author: "李白", dynasty: "唐", lines: ["渡远荆门外，", "来从楚国游。", "山随平野尽，", "江入大荒流。", "月下飞天镜，", "云生结海楼。", "仍怜故乡水，", "万里送行舟。"], translation: "远渡荆门外，来楚国游。山随平野尽，江入大荒流。月下飞天镜，云生结海楼。仍怜故乡水，万里送行舟。" },
            { title: "钱塘湖春行", author: "白居易", dynasty: "唐", lines: ["孤山寺北贾亭西，", "水面初平云脚低。", "几处早莺争暖树，", "谁家新燕啄春泥。", "乱花渐欲迷人眼，", "浅草才能没马蹄。", "最爱湖东行不足，", "绿杨阴里白沙堤。"], translation: "孤山寺北贾亭西，水面初平云脚低。几处早莺争暖树，谁家新燕啄春泥。乱花渐欲迷人眼，浅草才能没马蹄。最爱湖东行不足，绿杨阴里白沙堤。" },
            { title: "饮酒·其五", author: "陶渊明", dynasty: "东晋", lines: ["结庐在人境，", "而无车马喧。", "问君何能尔？", "心远地自偏。", "采菊东篱下，", "悠然见南山。", "山气日夕佳，", "飞鸟相与还。", "此中有真意，", "欲辨已忘言。"], translation: "在人境筑屋，却没有车马喧。问你怎能这样？心远地自偏。采菊东篱下，悠然见南山。山气傍晚好，飞鸟结伴还。此中有真意，想要辨说却忘了言。" },
            { title: "春望", author: "杜甫", dynasty: "唐", lines: ["国破山河在，", "城春草木深。", "感时花溅泪，", "恨别鸟惊心。", "烽火连三月，", "家书抵万金。", "白头搔更短，", "浑欲不胜簪。"], translation: "国都破碎山河还在，城里春天草木深深。感伤时势花溅泪，怅恨离别鸟惊心。战火连绵三月不断，家书珍贵抵万金。白头发越搔越短，简直要插不上簪。" },
            { title: "雁门太守行", author: "李贺", dynasty: "唐", lines: ["黑云压城城欲摧，", "甲光向日金鳞开。", "角声满天秋色里，", "塞上燕脂凝夜紫。", "半卷红旗临易水，", "霜重鼓寒声不起。", "报君黄金台上意，", "提携玉龙为君死。"], translation: "黑云压城城欲摧，甲光向日金鳞开。角声满天秋色里，塞上燕脂凝夜紫。半卷红旗临易水，霜重鼓寒声不起。报君黄金台上意，提携玉龙为君死。" },
            { title: "赤壁", author: "杜牧", dynasty: "唐", lines: ["折戟沉沙铁未销，", "自将磨洗认前朝。", "东风不与周郎便，", "铜雀春深锁二乔。"], translation: "折戟沉沙铁未销，自将磨洗认前朝。东风不与周郎便，铜雀春深锁二乔。" },
            { title: "渔家傲·天接云涛连晓雾", author: "李清照", dynasty: "宋", lines: ["天接云涛连晓雾，", "星河欲转千帆舞。", "仿佛梦魂归帝所。", "闻天语，", "殷勤问我归何处。", "我报路长嗟日暮，", "学诗谩有惊人句。", "九万里风鹏正举。", "风休住，", "蓬舟吹取三山去！"], translation: "天接云涛连晓雾，星河欲转千帆舞。仿佛梦魂归帝所。闻天语，殷勤问我归何处。我报路长嗟日暮，学诗谩有惊人句。九万里风鹏正举。风休住，蓬舟吹取三山去！" },
            { title: "三峡", author: "郦道元", dynasty: "北魏", lines: ["自三峡七百里中，两岸连山，略无阙处。重岩叠嶂，隐天蔽日，自非亭午夜分，不见曦月。","至于夏水襄陵，沿溯阻绝。或王命急宣，有时朝发白帝，暮到江陵，其间千二百里，虽乘奔御风，不以疾也。","春冬之时，则素湍绿潭，回清倒影。绝巘多生怪柏，悬泉瀑布，飞漱其间，清荣峻茂，良多趣味。","每至晴初霜旦，林寒涧肃，常有高猿长啸，属引凄异，空谷传响，哀转久绝。故渔者歌曰：“巴东三峡巫峡长，猿鸣三声泪沾裳。”"], translation: "在三峡七百里中，两岸山连着山，没有中断的地方。重重悬崖，层层峭壁，遮天蔽日，如果不是正午和半夜，看不见太阳月亮。到了夏天江水漫上山陵，上行下行航道都被阻断。有时皇帝命令急速传达，早上从白帝城出发，傍晚就到了江陵，其间一千二百里，即使骑着快马驾着风，也不如船快。春冬季节，白色的急流，碧绿的深潭，回旋的清波倒映着影子。极高的山顶上长着很多奇形怪状的柏树，悬泉瀑布，飞流冲荡，水清树荣山高草茂，趣味无穷。每逢雨后初晴或下霜的早晨，树林山涧清冷寂静，常有高处的猿猴拉长声音啼叫，声音连续不断，凄惨怪异，在空谷中回响，悲哀婉转很久才消失。所以打鱼的人唱道：“巴东三峡巫峡长，猿鸣三声泪沾裳。”" },
            { title: "答谢中书书", author: "陶弘景", dynasty: "南朝", lines: ["山川之美，古来共谈。高峰入云，清流见底。两岸石壁，五色交辉。青林翠竹，四时俱备。晓雾将歇，猿鸟乱鸣；夕日欲颓，沉鳞竞跃。实是欲界之仙都。自康乐以来，未复有能与其奇者。"], translation: "山川的美丽，自古以来人们共同谈论。高峰插入云霄，清流清澈见底。两岸石壁，五色交相辉映。青翠的树林和竹林，四季都有。清晨的薄雾快要消散时，猿鸟此起彼伏地鸣叫；傍晚太阳快要落山时，潜游的鱼儿争相跳出水面。这实在是人间仙境。自从谢灵运以来，再也没有能欣赏这奇景的人了。" },
            { title: "记承天寺夜游", author: "苏轼", dynasty: "宋", lines: ["元丰六年十月十二日夜，解衣欲睡，月色入户，欣然起行。念无与为乐者，遂至承天寺寻张怀民。怀民亦未寝，相与步于中庭。庭下如积水空明，水中藻、荇交横，盖竹柏影也。何夜无月？何处无竹柏？但少闲人如吾两人者耳。"], translation: "元丰六年十月十二日夜里，我解开衣服准备睡觉，月光照进门里，我高兴地起来走到户外。想到没有和我一起游乐的人，于是到承天寺找张怀民。怀民也没睡，我们一起在庭院中散步。月光照在院子里像积满清水一样澄澈，水中水藻、荇菜纵横交错，原来是竹子和柏树的影子。哪夜没有月光？哪里没有竹柏？只是缺少像我们两个这样清闲的人罢了。" },
            { title: "与朱元思书", author: "吴均", dynasty: "南朝", lines: ["风烟俱净，天山共色。从流飘荡，任意东西。自富阳至桐庐一百许里，奇山异水，天下独绝。","水皆缥碧，千丈见底。游鱼细石，直视无碍。急湍甚箭，猛浪若奔。","夹岸高山，皆生寒树，负势竞上，互相轩邈，争高直指，千百成峰。泉水激石，泠泠作响；好鸟相鸣，嘤嘤成韵。蝉则千转不穷，猿则百叫无绝。鸢飞戾天者，望峰息心；经纶世务者，窥谷忘反。横柯上蔽，在昼犹昏；疏条交映，有时见日。"], translation: "风烟都散尽，天空和山呈现同样的颜色。随着江流飘荡，任凭东西。从富阳到桐庐一百多里，奇山异水，天下独一无二。江水都是青白色的，千丈深也能见底。游鱼细石，直视无碍。湍急的流水比箭还快，凶猛的波浪像飞奔的马。两岸高山，都长着耐寒的树，凭借山势争着向上，互相争高，直指云天，形成千百座山峰。泉水冲激石头，发出泠泠的响声；好鸟相互鸣叫，嘤嘤成韵。蝉长久不断鸣叫，猿不停啼叫。那些极力攀高的人，看到这山峰也会平息名利之心；忙于政务的人，看到这山谷也会流连忘返。横斜的树枝在上面遮蔽，白天也像黄昏；稀疏的枝条交相掩映，有时能见到阳光。" },
            { title: "得道多助，失道寡助", author: "《孟子》", dynasty: "战国", lines: ["天时不如地利，地利不如人和。三里之城，七里之郭，环而攻之而不胜。夫环而攻之，必有得天时者矣，然而不胜者，是天时不如地利也。城非不高也，池非不深也，兵革非不坚利也，米粟非不多也，委而去之，是地利不如人和也。故曰：域民不以封疆之界，固国不以山溪之险，威天下不以兵革之利。得道者多助，失道者寡助。寡助之至，亲戚畔之；多助之至，天下顺之。以天下之所顺，攻亲戚之所畔，故君子有不战，战必胜矣。"], translation: "有利于作战的天气时令不如有利的地理形势，有利的地理形势不如人心所向、内部团结。方圆三里的内城，方圆七里的外城，围攻却不能取胜。能够围攻，一定有得天时的战机，却不能取胜，这是天时不如地利。城墙不是不高，护城河不是不深，武器不是不锋利坚固，粮食不是不多，却弃城而逃，这是地利不如人和。所以说：管理百姓不能靠疆域的界限，巩固国防不能靠山川的险阻，威震天下不能靠武器的锋利。行仁政的帮助的人就多，不行仁政的帮助的人就少。帮助少到极点时，连亲戚都会背叛；帮助多到极点时，全天下都顺从。以全天下顺从的力量去攻打连亲戚都背叛的人，所以君子要么不打，打必胜。" },
            { title: "富贵不能淫", author: "《孟子》", dynasty: "战国", lines: ["景春曰：“公孙衍、张仪岂不诚大丈夫哉？一怒而诸侯惧，安居而天下熄。”","孟子曰：“是焉得为大丈夫乎？子未学礼乎？丈夫之冠也，父命之；女子之嫁也，母命之，往送之门，戒之曰：‘往之女家，必敬必戒，无违夫子！’以顺为正者，妾妇之道也。居天下之广居，立天下之正位，行天下之大道。得志，与民由之；不得志，独行其道。富贵不能淫，贫贱不能移，威武不能屈。此之谓大丈夫。”"], translation: "景春说：“公孙衍、张仪难道不是真正的大丈夫吗？他们一发怒诸侯就害怕，他们安静下来天下就太平。”孟子说：“这怎么能叫大丈夫呢？你没有学过礼吗？男子行加冠礼时，父亲教导他；女子出嫁时，母亲教导她，送到门口，告诫她说：‘到了你夫家，一定要恭敬谨慎，不要违背丈夫！’以顺从为原则的，是妇人之道。住在天下最宽广的住宅‘仁’里，站在天下最正确的位置‘礼’上，走在天下最光明的大道‘义’上。得志时，和百姓一起走这条路；不得志时，独自走这条路。富贵不能迷乱他的思想，贫贱不能改变他的节操，威武不能屈服他的意志。这才叫大丈夫。”" },
            { title: "生于忧患，死于安乐", author: "《孟子》", dynasty: "战国", lines: ["舜发于畎亩之中，傅说举于版筑之间，胶鬲举于鱼盐之中，管夷吾举于士，孙叔敖举于海，百里奚举于市。故天将降大任于是人也，必先苦其心志，劳其筋骨，饿其体肤，空乏其身，行拂乱其所为，所以动心忍性，曾益其所不能。","人恒过，然后能改；困于心，衡于虑，而后作；征于色，发于声，而后喻。入则无法家拂士，出则无敌国外患者，国恒亡。然后知生于忧患，而死于安乐也。"], translation: "舜从田间被起用，傅说从筑墙的工匠中被选拔，胶鬲从鱼盐贩中被举用，管夷吾从狱官手中被释放任用，孙叔敖从海边被任用，百里奚从市场上被赎回任用。所以上天将要把重大使命交给这个人，一定先使他内心痛苦，筋骨劳累，忍饥挨饿，身受贫困，做事总是受阻，用这些来激励他的心志，使他性情坚韧，增加他所不具备的能力。人常常犯错误，然后才能改正；内心困惑，思虑堵塞，然后才能奋发；表现在脸色上，流露在言谈中，才能被人了解。一个国家，内部没有坚持法度的大臣和辅佐的贤士，外部没有敌对国家的忧患，常常灭亡。这样以后才明白，忧患能使人生存发展，安乐享乐能使人灭亡。" },
            { title: "愚公移山", author: "《列子》", dynasty: "战国", lines: ["太行、王屋二山，方七百里，高万仞，本在冀州之南，河阳之北。","北山愚公者，年且九十，面山而居。惩山北之塞，出入之迂也，聚室而谋曰：“吾与汝俱平险，指通豫南，达于汉阴，可乎？”杂然相许。其妻献疑曰：“以君之力，曾不能损魁父之丘，如太行、王屋何？且焉置土石？”杂曰：“投诸渤海之尾，隐土之北。”遂率子孙荷担者三夫，叩石垦壤，箕畚运于渤海之尾。邻人京城氏之孀妻有遗男，始龀，跳往助之。寒暑易节，始一反焉。","河曲智叟笑而止之曰：“甚矣，汝之不惠！以残年余力，曾不能毁山之一毛，其如土石何？”北山愚公长息曰：“汝心之固，固不可彻，曾不若孀妻弱子。虽我之死，有子存焉。子又生孙，孙又生子；子又有子，子又有孙；子子孙孙无穷匮也，而山不加增，何苦而不平？”河曲智叟亡以应。","操蛇之神闻之，惧其不已也，告之于帝。帝感其诚，命夸娥氏二子负二山，一厝朔东，一厝雍南。自此，冀之南，汉之阴，无垄断焉。"], translation: "太行、王屋两座山，方圆七百里，高七八千丈，本来在冀州南边，河阳北边。北山愚公，年纪将近九十，面对着山居住。苦于山北面道路阻塞，出入绕远，就召集家人商量说：“我和你们一起挖平险峻的大山，直通豫州南部，到达汉水南岸，可以吗？”大家纷纷表示赞成。他妻子提出疑问：“凭你的力气，连魁父这样的小山丘都不能削平，能把太行、王屋怎么样？况且往哪里放置土石？”众人说：“把它扔到渤海边，隐土北面。”于是愚公带领子孙中能挑担子的三个人，凿石挖土，用箕畚运到渤海边。邻居京城氏的寡妇有个孤儿，刚七八岁，蹦蹦跳跳地去帮助他。冬夏换季，才往返一次。河曲智叟笑着阻止愚公说：“你也太不聪明了！凭你残余的年月和力气，连山上的一根草都毁不掉，能把土石怎么样？”北山愚公长叹说：“你思想顽固，顽固到不可改变的地步，连寡妇和小孩都不如。即使我死了，还有儿子在。儿子又生孙子，孙子又生儿子；儿子又有儿子，儿子又有孙子；子子孙孙无穷无尽，而山不加高，何愁挖不平？”河曲智叟无话可答。握着蛇的山神听说了这件事，怕他不停地干下去，向天帝报告了。天帝被他的诚心感动，命令夸娥氏的两个儿子背走两座山，一座放在朔东，一座放在雍南。从此，冀州南部，汉水南岸，没有高山阻隔了。" },
            { title: "周亚夫军细柳", author: "司马迁", dynasty: "西汉", lines: ["文帝之后六年，匈奴大入边。乃以宗正刘礼为将军，军霸上；祝兹侯徐厉为将军，军棘门；以河内守亚夫为将军，军细柳：以备胡。","上自劳军。至霸上及棘门军，直驰入，将以下骑送迎。已而之细柳军，军士吏被甲，锐兵刃，彀弓弩，持满。天子先驱至，不得入。先驱曰：“天子且至！”军门都尉曰：“将军令曰：‘军中闻将军令，不闻天子之诏。’”居无何，上至，又不得入。于是上乃使使持节诏将军：“吾欲入劳军。”亚夫乃传言开壁门。壁门士吏谓从属车骑曰：“将军约，军中不得驱驰。”于是天子乃按辔徐行。至营，将军亚夫持兵揖曰：“介胄之士不拜，请以军礼见。”天子为动，改容式车。使人称谢：“皇帝敬劳将军。”成礼而去。","既出军门，群臣皆惊。文帝曰：“嗟乎，此真将军矣！曩者霸上、棘门军，若儿戏耳，其将固可袭而虏也。至于亚夫，可得而犯邪！”称善者久之。"], translation: "汉文帝后元六年，匈奴大举入侵边境。于是任命宗正刘礼为将军，驻军霸上；祝兹侯徐厉为将军，驻军棘门；任命河内太守周亚夫为将军，驻军细柳：以防备匈奴。皇帝亲自慰劳军队。到霸上和棘门军营，直接驰入，将军及属下都骑着马迎送。之后来到细柳军营，官兵都披甲，刀枪锋利，拉开弓弩，拉满弓。天子的先驱到达，不能进入。先驱说：“天子将要到了！”军门都尉说：“将军命令：‘军中只听将军命令，不听天子诏令。’”过了一会儿，皇上到了，又进不去。于是皇上就派使者手持符节下诏给将军：“我想进去慰劳军队。”周亚夫这才传令打开壁门。壁门官兵对跟随的车队说：“将军规定，军营中不能驱驰。”于是天子就控制缰绳慢行。到军营，将军周亚夫手持兵器作揖说：“穿铠甲戴头盔的将士不能跪拜，请允许用军礼拜见。”天子被感动，脸色严肃，俯身扶着车前横木。派人致谢：“皇帝敬重地慰劳将军。”完成礼仪离去。出了军门，群臣都很惊讶。文帝说：“啊，这才是真正的将军！以前霸上、棘门的军队，像儿戏一样，他们的将军本来可以被袭击俘虏的。至于周亚夫，怎么可能被侵犯呢！”称赞了很长时间。" },
            { title: "庭中有奇树", author: "古诗十九首", dynasty: "东汉", lines: ["庭中有奇树，", "绿叶发华滋。", "攀条折其荣，", "将以遗所思。", "馨香盈怀袖，", "路远莫致之。", "此物何足贵？", "但感别经时。"], translation: "庭中有佳树，绿叶繁花。攀条折花，想送给思念的人。香气满怀袖，路远难送到。此物何足贵？只感离别久。" },
            { title: "龟虽寿", author: "曹操", dynasty: "东汉", lines: ["神龟虽寿，犹有竟时。", "腾蛇乘雾，终为土灰。", "老骥伏枥，志在千里。", "烈士暮年，壮心不已。", "盈缩之期，不但在天；", "养怡之福，可得永年。", "幸甚至哉，歌以咏志。"], translation: "神龟虽然长寿，仍有终结的时候；腾蛇能乘雾，终究化为土灰。老马伏在马槽边，志向仍在千里；英雄到了晚年，雄心依旧不止。寿命长短，不只由天决定；调养身心，也可以益寿延年。庆幸得很，用诗歌来歌咏志向。" },
            { title: "赠从弟·其二", author: "刘桢", dynasty: "东汉", lines: ["亭亭山上松，", "瑟瑟谷中风。", "风声一何盛，", "松枝一何劲！", "冰霜正惨凄，", "终岁常端正。", "岂不罹凝寒？", "松柏有本性。"], translation: "高耸的山上松，瑟缩的谷中风。风声多么大，松枝多么劲！冰霜正惨凄，终年常端正。难道没遇严寒？松柏有本性。" },
            { title: "梁甫行", author: "曹植", dynasty: "三国", lines: ["八方各异气，千里殊风雨。", "剧哉边海民，寄身于草野。", "妻子象禽兽，行止依林阻。", "柴门何萧条，狐兔翔我宇。"], translation: "八方的气候不同，千里内的风雨也不同。边海的人民生活艰苦，寄身在野外。妻子像禽兽一样，行动依靠山林险阻。柴门多么萧条，狐兔在屋里奔跑。" },
            { title: "浣溪沙", author: "晏殊", dynasty: "宋", lines: ["一曲新词酒一杯，", "去年天气旧亭台。", "夕阳西下几时回？", "无可奈何花落去，", "似曾相识燕归来。", "小园香径独徘徊。"], translation: "听一曲新词，饮一杯酒，还是去年天气，旧时亭台。夕阳西下几时回？无可奈何花落去，似曾相识燕归来。小园香径独自徘徊。" },
            { title: "采桑子", author: "欧阳修", dynasty: "宋", lines: ["轻舟短棹西湖好，", "绿水逶迤。", "芳草长堤，", "隐隐笙歌处处随。", "无风水面琉璃滑，", "不觉船移。", "微动涟漪，", "惊起沙禽掠岸飞。"], translation: "轻舟短桨西湖好，绿水蜿蜒。芳草长堤，隐隐笙歌处处随。无风水面琉璃滑，不觉船移。微动涟漪，惊起沙禽掠岸飞。" },
            { title: "相见欢", author: "朱敦儒", dynasty: "宋", lines: ["金陵城上西楼，", "倚清秋。", "万里夕阳垂地，", "大江流。", "中原乱，", "簪缨散，", "几时收？", "试倩悲风吹泪，", "过扬州。"], translation: "金陵城上西楼，倚靠清秋。万里夕阳垂地，大江流。中原乱，簪缨散，几时收？试倩悲风吹泪，过扬州。" },
            { title: "如梦令", author: "李清照", dynasty: "宋", lines: ["常记溪亭日暮，", "沉醉不知归路。", "兴尽晚回舟，", "误入藕花深处。", "争渡，争渡，", "惊起一滩鸥鹭。"], translation: "时常记起在溪边亭子游玩到日暮，喝醉了不知道回家的路。尽兴后很晚才划船回去，不小心进入荷花深处。奋力划啊，奋力划，惊起满滩的鸥鹭。" }
        ]},
        { grade: "八年级（下）", list: [
            { title: "桃花源记", author: "陶渊明", dynasty: "东晋", lines: ["晋太元中，武陵人捕鱼为业。缘溪行，忘路之远近。忽逢桃花林，夹岸数百步，中无杂树，芳草鲜美，落英缤纷。渔人甚异之，复前行，欲穷其林。","林尽水源，便得一山，山有小口，仿佛若有光。便舍船，从口入。初极狭，才通人。复行数十步，豁然开朗。土地平旷，屋舍俨然，有良田、美池、桑竹之属。阡陌交通，鸡犬相闻。其中往来种作，男女衣着，悉如外人。黄发垂髫，并怡然自乐。","见渔人，乃大惊，问所从来。具答之。便要还家，设酒杀鸡作食。村中闻有此人，咸来问讯。自云先世避秦时乱，率妻子邑人来此绝境，不复出焉，遂与外人间隔。问今是何世，乃不知有汉，无论魏晋。此人一一为具言所闻，皆叹惋。余人各复延至其家，皆出酒食。停数日，辞去。此中人语云：“不足为外人道也。”","既出，得其船，便扶向路，处处志之。及郡下，诣太守，说如此。太守即遣人随其往，寻向所志，遂迷，不复得路。","南阳刘子骥，高尚士也，闻之，欣然规往。未果，寻病终。后遂无问津者。"], translation: "晋朝太元年间，武陵有个捕鱼的人。沿着溪水走，忘了路远近。忽然遇到桃花林，两岸几百步，没有杂树，芳草鲜美，落花纷纷。渔人很诧异，再向前走，想走到林子尽头。林子尽头是水源，就见到一座山，山有小口，仿佛有光。就丢下船，从口进入。起初很狭窄，只容一人。再走几十步，豁然开朗。土地平坦开阔，房屋整齐，有良田、美池、桑竹之类。田间小路交错，鸡狗声相闻。其中往来耕作的人，男女衣着，都像外人。老人小孩，都怡然自乐。见到渔人，很吃惊，问从哪来。渔人一一回答。就邀请回家，摆酒杀鸡做饭。村里听说有此人，都来打听。他们自称祖先躲避秦时战乱，带领妻子儿女和同乡来到这绝境，不再出去，就与外人隔绝了。问现在是什么朝代，竟然不知道有汉朝，更不用说魏晋了。渔人一一为他们详细讲述，大家都感叹。其余人各自邀请到他们家，都拿出酒食。住了几天，告辞离去。这里的人说：“不值得对外人说。”出来后，找到船，就顺着原路，处处做标记。到郡城，见太守，说了这些。太守立刻派人跟他去，寻找以前做的标记，却迷了路，再找不到路。南阳刘子骥，是高洁人士，听说此事，欣然计划前往。没实现，不久病逝。以后就没有探访的人了。" },
            { title: "小石潭记", author: "柳宗元", dynasty: "唐", lines: ["从小丘西行百二十步，隔篁竹，闻水声，如鸣珮环，心乐之。伐竹取道，下见小潭，水尤清冽。全石以为底，近岸，卷石底以出，为坻，为屿，为嵁，为岩。青树翠蔓，蒙络摇缀，参差披拂。","潭中鱼可百许头，皆若空游无所依，日光下澈，影布石上。佁然不动，俶尔远逝，往来翕忽，似与游者相乐。","潭西南而望，斗折蛇行，明灭可见。其岸势犬牙差互，不可知其源。","坐潭上，四面竹树环合，寂寥无人，凄神寒骨，悄怆幽邃。以其境过清，不可久居，乃记之而去。","同游者：吴武陵，龚古，余弟宗玄。隶而从者，崔氏二小生：曰恕己，曰奉壹。"], translation: "从小丘向西一百二十步，隔着竹林，听到水声像玉佩碰撞，心里高兴。砍竹开路，下面见小潭，水特别清凉。整块石头做底，靠近岸边，石底卷起露出，形成小礁、小岛、石崖、岩石。青树翠蔓，覆盖缠绕，参差飘动。潭中鱼大约百来条，都好像在空中游动无所依，阳光直照，影子布在石上。呆呆不动，忽然远逝，往来轻快，好像与游人同乐。向潭西南望去，溪水像北斗星曲折像蛇行，忽明忽暗。两岸像犬牙交错，不知源头。坐在潭边，四面竹树环抱，寂寥无人，心神凄凉，寒气透骨，幽深忧伤。因为环境太清冷，不能久留，于是记下离开。同游者：吴武陵，龚古，我弟宗玄。随从的，崔家两个年轻人：一个叫恕己，一个叫奉壹。" },
            { title: "关雎", author: "诗经·周南", dynasty: "周", lines: ["关关雎鸠，在河之洲。窈窕淑女，君子好逑。","参差荇菜，左右流之。窈窕淑女，寤寐求之。","求之不得，寤寐思服。悠哉悠哉，辗转反侧。","参差荇菜，左右采之。窈窕淑女，琴瑟友之。","参差荇菜，左右芼之。窈窕淑女，钟鼓乐之。"], translation: "关关鸣叫的雎鸠，在河中小洲。美丽贤淑的女子，是君子的好配偶。长短不齐的荇菜，左右采摘。美丽贤淑的女子，日夜追求。追求不到，日夜思念。思念绵绵，翻来覆去睡不着。长短不齐的荇菜，左右采择。美丽贤淑的女子，弹琴瑟亲近她。长短不齐的荇菜，左右挑选。美丽贤淑的女子，敲钟鼓使她快乐。" },
            { title: "蒹葭", author: "诗经·秦风", dynasty: "周", lines: ["蒹葭苍苍，白露为霜。所谓伊人，在水一方。溯洄从之，道阻且长。溯游从之，宛在水中央。","蒹葭萋萋，白露未晞。所谓伊人，在水之湄。溯洄从之，道阻且跻。溯游从之，宛在水中坻。","蒹葭采采，白露未已。所谓伊人，在水之涘。溯洄从之，道阻且右。溯游从之，宛在水中沚。"], translation: "芦苇茂密，白露成霜。所说的那个人，在水的那一边。逆流去找，道路险阻漫长。顺流去找，仿佛就在水中央。芦苇茂盛，露水未干。那个人，在水边。逆流去找，道路险阻高陡。顺流去找，仿佛就在水中礁。芦苇繁盛，露水还在。那个人，在水岸。逆流去找，道路险阻弯曲。顺流去找，仿佛就在水中洲。" },
            { title: "茅屋为秋风所破歌", author: "杜甫", dynasty: "唐", lines: ["八月秋高风怒号，卷我屋上三重茅。茅飞渡江洒江郊，高者挂罥长林梢，下者飘转沉塘坳。","南村群童欺我老无力，忍能对面为盗贼。公然抱茅入竹去，唇焦口燥呼不得，归来倚杖自叹息。","俄顷风定云墨色，秋天漠漠向昏黑。布衾多年冷似铁，娇儿恶卧踏里裂。床头屋漏无干处，雨脚如麻未断绝。自经丧乱少睡眠，长夜沾湿何由彻！","安得广厦千万间，大庇天下寒士俱欢颜，风雨不动安如山。呜呼！何时眼前突兀见此屋，吾庐独破受冻死亦足！"], translation: "八月秋高风怒号，卷走我屋上三重茅。茅飞过江洒江郊，高的挂在高树梢，低的飘转沉水塘。南村群童欺我老无力，忍心当面做盗贼。公然抱茅入竹林，唇焦口燥呼不得，回来倚杖自叹息。一会儿风停云墨色，秋天漠漠向昏黑。布被多年冷似铁，娇儿恶卧踏里裂。床头屋漏无干处，雨脚如麻未断绝。自从战乱少睡眠，长夜湿冷何时亮！怎么得到千万间大房子，庇护天下寒士都欢颜，风雨不动安如山。唉！何时眼前出现此屋，我屋独破受冻死也值！" }
        ]},
        { grade: "九年级（上）", list: [
            { title: "沁园春·雪", author: "毛泽东", dynasty: "现代", lines: ["北国风光，千里冰封，万里雪飘。","望长城内外，惟余莽莽；大河上下，顿失滔滔。","山舞银蛇，原驰蜡象，欲与天公试比高。","须晴日，看红装素裹，分外妖娆。","江山如此多娇，引无数英雄竞折腰。","惜秦皇汉武，略输文采；唐宗宋祖，稍逊风骚。","一代天骄，成吉思汗，只识弯弓射大雕。","俱往矣，数风流人物，还看今朝。"], translation: "北国风光，千里冰封，万里雪飘。望长城内外，只剩白茫茫一片；黄河上下，顿时失去滔滔水势。山像银蛇舞动，高原像蜡象奔驰，想和天公比高。等到晴天，看红妆素裹，格外娇艳。江山如此多娇，引得无数英雄为之倾倒。可惜秦始皇汉武帝，文采稍差；唐太宗宋太祖，文学才华不足。一代天骄成吉思汗，只知道拉弓射雕。都过去了，数风流人物，还要看今天。" },
            { title: "我爱这土地", author: "艾青", dynasty: "现代", lines: ["假如我是一只鸟，","我也应该用嘶哑的喉咙歌唱：","这被暴风雨所打击着的土地，","这永远汹涌着我们的悲愤的河流，","这无止息地吹刮着的激怒的风，","和那来自林间的无比温柔的黎明……","——然后我死了，","连羽毛也腐烂在土地里面。","为什么我的眼里常含泪水？","因为我对这土地爱得深沉……"], translation: "假如我是一只鸟，我也应该用嘶哑的喉咙歌唱：这被暴风雨打击着的土地，这永远汹涌着我们的悲愤的河流，这无止息地吹刮着的激怒的风，和那来自林间的无比温柔的黎明……——然后我死了，连羽毛也腐烂在土地里面。为什么我的眼里常含泪水？因为我对这土地爱得深沉……" },
            { title: "岳阳楼记", author: "范仲淹", dynasty: "宋", lines: ["庆历四年春，滕子京谪守巴陵郡。越明年，政通人和，百废具兴，乃重修岳阳楼，增其旧制，刻唐贤今人诗赋于其上，属予作文以记之。","予观夫巴陵胜状，在洞庭一湖。衔远山，吞长江，浩浩汤汤，横无际涯；朝晖夕阴，气象万千。此则岳阳楼之大观也，前人之述备矣。然则北通巫峡，南极潇湘，迁客骚人，多会于此，览物之情，得无异乎？","若夫淫雨霏霏，连月不开，阴风怒号，浊浪排空；日星隐曜，山岳潜形；商旅不行，樯倾楫摧；薄暮冥冥，虎啸猿啼。登斯楼也，则有去国怀乡，忧谗畏讥，满目萧然，感极而悲者矣。","至若春和景明，波澜不惊，上下天光，一碧万顷；沙鸥翔集，锦鳞游泳；岸芷汀兰，郁郁青青。而或长烟一空，皓月千里，浮光跃金，静影沉璧，渔歌互答，此乐何极！登斯楼也，则有心旷神怡，宠辱偕忘，把酒临风，其喜洋洋者矣。","嗟夫！予尝求古仁人之心，或异二者之为，何哉？不以物喜，不以己悲；居庙堂之高则忧其民，处江湖之远则忧其君。是进亦忧，退亦忧。然则何时而乐耶？其必曰“先天下之忧而忧，后天下之乐而乐”乎！噫！微斯人，吾谁与归？","时六年九月十五日。"], translation: "庆历四年春天，滕子京贬守巴陵郡。到第二年，政通人和，百废俱兴，就重修岳阳楼，扩大旧制，刻唐贤今人诗赋在上面，嘱托我写文章记下。我看那巴陵美景，全在洞庭湖。含着远山，吞着长江，浩浩荡荡，广阔无边；早晚阴晴，气象万千。这是岳阳楼的壮观，前人描述很详尽了。但是北通巫峡，南极潇湘，贬官诗人，多在这里会集，观景的心情，能没有不同吗？像那阴雨连绵，几个月不放晴，阴风怒号，浊浪排空；日月隐曜，山岳潜形；商旅不行，桅杆倾倒；傍晚昏暗，虎啸猿啼。登楼时，就会产生离开京城怀念故乡，担心谗言害怕讥讽，满眼萧条，感慨至极而悲伤的情绪。至于春日晴好，波澜不惊，上下天光，一碧万顷；沙鸥翔集，锦鳞游泳；岸上芷草，小洲兰花，郁郁青青。有时长烟一空，皓月千里，浮光跃金，静影沉璧，渔歌互答，这种乐趣哪有尽头！登楼时，就心旷神怡，荣耀屈辱都忘，临风饮酒，喜气洋洋。唉！我曾经探求古代仁人的心境，或许不同于以上两种，为什么呢？不因外物而喜，不因自身而悲；在朝廷高位就忧虑百姓，在江湖远地就忧虑君主。这样进也忧，退也忧。那么何时快乐呢？他们必定说“先天下之忧而忧，后天下之乐而乐”吧！唉！没有这种人，我同谁一道呢？写于庆历六年九月十五日。" },
            { title: "醉翁亭记", author: "欧阳修", dynasty: "宋", lines: ["环滁皆山也。其西南诸峰，林壑尤美。望之蔚然而深秀者，琅琊也。山行六七里，渐闻水声潺潺，而泻出于两峰之间者，酿泉也。峰回路转，有亭翼然临于泉上者，醉翁亭也。作亭者谁？山之僧智仙也。名之者谁？太守自谓也。太守与客来饮于此，饮少辄醉，而年又最高，故自号曰醉翁也。醉翁之意不在酒，在乎山水之间也。山水之乐，得之心而寓之酒也。","若夫日出而林霏开，云归而岩穴暝，晦明变化者，山间之朝暮也。野芳发而幽香，佳木秀而繁阴，风霜高洁，水落而石出者，山间之四时也。朝而往，暮而归，四时之景不同，而乐亦无穷也。","至于负者歌于途，行者休于树，前者呼，后者应，伛偻提携，往来而不绝者，滁人游也。临溪而渔，溪深而鱼肥；酿泉为酒，泉香而酒洌；山肴野蔌，杂然而前陈者，太守宴也。宴酣之乐，非丝非竹，射者中，弈者胜，觥筹交错，起坐而喧哗者，众宾欢也。苍颜白发，颓然乎其间者，太守醉也。","已而夕阳在山，人影散乱，太守归而宾客从也。树林阴翳，鸣声上下，游人去而禽鸟乐也。然而禽鸟知山林之乐，而不知人之乐；人知从太守游而乐，而不知太守之乐其乐也。醉能同其乐，醒能述以文者，太守也。太守谓谁？庐陵欧阳修也。"], translation: "环绕滁州都是山。西南的山峰，林壑尤其美。望去草木茂盛秀丽的是琅琊山。走六七里，渐闻水声潺潺，从两峰间泻出的是酿泉。峰回路转，有亭翼然临于泉上的是醉翁亭。建亭的是山僧智仙。取名的是太守自称。太守与客来此饮酒，少饮就醉，年纪又最大，所以自号醉翁。醉翁之意不在酒，在山水之间。山水之乐，在心里而寄托在酒中。像那日出林霏散开，云归岩穴昏暗，明暗变化，是山间早晚。野花开放而幽香，佳木繁茂而阴凉，风霜高洁，水落石出，是山间四季。早晨去，傍晚回，四季景色不同，乐趣无穷。至于背东西的人唱歌，行人在树下休息，前呼后应，老人小孩，往来不绝，是滁人游。临溪捕鱼，溪深鱼肥；酿泉为酒，泉香酒洌；山肴野蔬，摆列在前，是太守宴。宴饮酣畅，不是丝竹音乐，投壶的投中，下棋的获胜，酒杯交错，起坐喧哗，是众宾欢乐。苍颜白发，醉倒在中间，是太守醉。不久夕阳在山，人影散乱，太守回而宾客跟从。树林阴翳，鸟声上下，游人离去而禽鸟快乐。但禽鸟知山林之乐，而不知人之乐；人知从太守游而乐，而不知太守以他们的快乐为快乐。醉了能同乐，醒了能写文章记述，是太守。太守是谁？庐陵欧阳修。" },
            { title: "湖心亭看雪", author: "张岱", dynasty: "明", lines: ["崇祯五年十二月，余住西湖。大雪三日，湖中人鸟声俱绝。是日更定矣，余拏一小舟，拥毳衣炉火，独往湖心亭看雪。雾凇沆砀，天与云与山与水，上下一白。湖上影子，惟长堤一痕、湖心亭一点、与余舟一芥、舟中人两三粒而已。","到亭上，有两人铺毡对坐，一童子烧酒炉正沸。见余大喜曰：“湖中焉得更有此人！”拉余同饮。余强饮三大白而别。问其姓氏，是金陵人，客此。及下船，舟子喃喃曰：“莫说相公痴，更有痴似相公者。”"], translation: "崇祯五年十二月，我住在西湖。大雪下了三天，湖中人声鸟声都消失了。这天初更时分，我划着一叶扁舟，穿着细毛皮衣，带着炉火，独自去湖心亭看雪。雾气弥漫，天和云和山和水，上下全白。湖上的影子，只有一道长堤的痕迹，一点湖心亭的轮廓，和我的一叶小舟，舟中两三粒人影罢了。到了亭上，有两个人铺着毡子相对而坐，一个童子正在温酒，酒炉正沸。看见我，非常高兴地说：“湖中怎么还有这种人！”拉着我一起饮酒。我勉强喝了三大杯告别。问他们姓氏，是金陵人，客居在此。等到下船，船夫喃喃自语：“别说相公痴，还有比相公更痴的人。”" },
            { title: "月夜忆舍弟", author: "杜甫", dynasty: "唐", lines: ["戍鼓断人行，边秋一雁声。", "露从今夜白，月是故乡明。", "有弟皆分散，无家问死生。", "寄书长不达，况乃未休兵。"], translation: "戍鼓敲响，行人断绝，边塞的秋空中传来孤雁的叫声。露从今夜开始变白，月亮还是故乡的最明亮。有兄弟都离散了，没有家可以打听他们的生死。寄信常常收不到，何况战乱还没停止。" },
            { title: "长沙过贾谊宅", author: "刘长卿", dynasty: "唐", lines: ["三年谪宦此栖迟，万古惟留楚客悲。", "秋草独寻人去后，寒林空见日斜时。", "汉文有道恩犹薄，湘水无情吊岂知。", "寂寂江山摇落处，怜君何事到天涯。"], translation: "你被贬三年在此停留，万古只留下楚客的悲哀。秋草中独自寻访你离去后的痕迹，寒林里只见夕阳斜照。汉文帝有道尚且恩薄，湘水无情，凭吊怎能知晓。江山寂寞摇落，可怜你为何被贬到这偏远之地。" },
            { title: "左迁至蓝关示侄孙湘", author: "韩愈", dynasty: "唐", lines: ["一封朝奏九重天，夕贬潮州路八千。", "欲为圣明除弊事，肯将衰朽惜残年！", "云横秦岭家何在？雪拥蓝关马不前。", "知汝远来应有意，好收吾骨瘴江边。"], translation: "早晨一封奏章呈给朝廷，晚上就被贬到八千里外的潮州。本想为圣上清除弊政，岂肯因为衰老就吝惜残年！云横秦岭，家在何处？大雪拥塞蓝关，马不肯前行。知道你远来应有深意，正好收我的尸骨在瘴江边。" },
            { title: "商山早行", author: "温庭筠", dynasty: "唐", lines: ["晨起动征铎，客行悲故乡。", "鸡声茅店月，人迹板桥霜。", "槲叶落山路，枳花明驿墙。", "因思杜陵梦，凫雁满回塘。"], translation: "清晨起来，车铃响动，远行的人思念故乡。鸡叫声从茅店传来，月亮还挂在天上，行人的足迹印在板桥的霜上。槲叶落满山路，枳花照亮驿墙。回想昨夜梦见杜陵，凫雁落满了回塘。" },
            { title: "咸阳城东楼", author: "许浑", dynasty: "唐", lines: ["一上高城万里愁，蒹葭杨柳似汀洲。", "溪云初起日沉阁，山雨欲来风满楼。", "鸟下绿芜秦苑夕，蝉鸣黄叶汉宫秋。", "行人莫问当年事，故国东来渭水流。"], translation: "一登上高楼就涌起万里乡愁，蒹葭杨柳像是故乡的沙洲。溪上云起，夕阳沉落阁后，山雨欲来，风满楼。鸟儿飞下绿芜的秦苑，蝉在黄叶的汉宫鸣叫。行人莫问当年往事，故国东来只有渭水长流。" },
            { title: "无题", author: "李商隐", dynasty: "唐", lines: ["相见时难别亦难，东风无力百花残。", "春蚕到死丝方尽，蜡炬成灰泪始干。", "晓镜但愁云鬓改，夜吟应觉月光寒。", "蓬山此去无多路，青鸟殷勤为探看。"], translation: "相见难，离别更难，东风无力，百花凋残。春蚕到死丝才吐尽，蜡烛烧成灰泪才流干。早晨照镜愁云鬓改变，夜晚吟诗应觉月光寒。蓬山离此不远，青鸟啊，请为我殷勤探望。" },
            { title: "行香子", author: "秦观", dynasty: "宋", lines: ["树绕村庄，水满陂塘。倚东风、豪兴徜徉。小园几许，收尽春光。有桃花红，李花白，菜花黄。","远远围墙，隐隐茅堂。飏青旗、流水桥旁。偶然乘兴、步过东冈。正莺儿啼，燕儿舞，蝶儿忙。"], translation: "绿树环绕村庄，春水满池塘。乘着东风，豪兴徜徉。小园不大，却收尽春光。有桃花红，李花白，菜花黄。远远的围墙，隐隐的茅堂。青旗飘飏，流水桥旁。偶然乘兴，走过东冈。正是莺儿啼，燕儿舞，蝶儿忙。" },
            { title: "丑奴儿·书博山道中壁", author: "辛弃疾", dynasty: "宋", lines: ["少年不识愁滋味，爱上层楼。爱上层楼，为赋新词强说愁。","而今识尽愁滋味，欲说还休。欲说还休，却道“天凉好个秋”！"], translation: "少年时不知道愁的滋味，喜欢登上高楼。喜欢登上高楼，为了写新词勉强说愁。如今尝尽了愁的滋味，想说却休。想说却休，却说“天凉好个秋”！" }
        ]},
        { grade: "九年级（下）", list: [
            { title: "鱼我所欲也", author: "《孟子》", dynasty: "战国", lines: [
                "鱼，我所欲也；熊掌，亦我所欲也。二者不可得兼，舍鱼而取熊掌者也。",
                "生，亦我所欲也；义，亦我所欲也。二者不可得兼，舍生而取义者也。",
                "生亦我所欲，所欲有甚于生者，故不为苟得也；死亦我所恶，所恶有甚于死者，故患有所不辟也。",
                "如使人之所欲莫甚于生，则凡可以得生者何不用也？使人之所恶莫甚于死者，则凡可以辟患者何不为也？",
                "由是则生而有不用也，由是则可以辟患而有不为也。是故所欲有甚于生者，所恶有甚于死者。",
                "非独贤者有是心也，人皆有之，贤者能勿丧耳。",
                "一箪食，一豆羹，得之则生，弗得则死。呼尔而与之，行道之人弗受；蹴尔而与之，乞人不屑也。",
                "万钟则不辩礼义而受之，万钟于我何加焉！为宫室之美、妻妾之奉、所识穷乏者得我与？",
                "乡为身死而不受，今为宫室之美为之；乡为身死而不受，今为妻妾之奉为之；乡为身死而不受，今为所识穷乏者得我而为之：是亦不可以已乎？此之谓失其本心。"
            ], translation: "鱼是我想要的，熊掌也是我想要的；如果不能同时得到，就舍弃鱼而选取熊掌。生命是我想要的，道义也是我想要的；如果不能同时拥有，就舍弃生命而选取道义。生命是我想要的，但还有比生命更想要的东西，所以不做苟且偷生的事；死亡是我厌恶的，但还有比死亡更厌恶的东西，所以有些祸患不躲避。假如人们想要的没有超过生命的，那么凡是可以求生的手段，有什么不能用呢？假如人们厌恶的没有超过死亡的，那么凡是可以避祸的事情，有什么不能做呢？由此就可以生存却有人不用，由此就可以避祸却有人不做，是因为有比生命更想要的东西，有比死亡更厌恶的东西。不仅贤人有这种本心，人人都有，只是贤人能够不丧失罢了。一筐饭，一碗汤，得到就能活，得不到就死。吆喝着给他，过路的人也不会接受；用脚踩过再给他，乞丐也不屑于要。万钟的俸禄如果不辨礼义就接受，万钟对我有什么好处呢？是为了宫室的华美、妻妾的侍奉、所认识的穷人感激我吗？过去宁死也不接受，现在为了宫室的华美而为之；过去宁死也不接受，现在为了妻妾的侍奉而为之；过去宁死也不接受，现在为了所认识的穷人感激我而为之：这些不也可以停止了吗？这就叫丧失了人的本性。" },
            { title: "唐雎不辱使命", author: "《战国策》", dynasty: "西汉", lines: [
                "秦王使人谓安陵君曰：“寡人欲以五百里之地易安陵，安陵君其许寡人！”安陵君曰：“大王加惠，以大易小，甚善；虽然，受地于先王，愿终守之，弗敢易！”秦王不说。安陵君因使唐雎使于秦。",
                "秦王谓唐雎曰：“寡人以五百里之地易安陵，安陵君不听寡人，何也？且秦灭韩亡魏，而君以五十里之地存者，以君为长者，故不错意也。今吾以十倍之地，请广于君，而君逆寡人者，轻寡人与？”唐雎对曰：“否，非若是也。安陵君受地于先王而守之，虽千里不敢易也，岂直五百里哉？”",
                "秦王怫然怒，谓唐雎曰：“公亦尝闻天子之怒乎？”唐雎对曰：“臣未尝闻也。”秦王曰：“天子之怒，伏尸百万，流血千里。”唐雎曰：“大王尝闻布衣之怒乎？”秦王曰：“布衣之怒，亦免冠徒跣，以头抢地尔。”唐雎曰：“此庸夫之怒也，非士之怒也。夫专诸之刺王僚也，彗星袭月；聂政之刺韩傀也，白虹贯日；要离之刺庆忌也，仓鹰击于殿上。此三子者，皆布衣之士也，怀怒未发，休祲降于天，与臣而将四矣。若士必怒，伏尸二人，流血五步，天下缟素，今日是也。”挺剑而起。",
                "秦王色挠，长跪而谢之曰：“先生坐！何至于此！寡人谕矣：夫韩、魏灭亡，而安陵以五十里之地存者，徒以有先生也。”"
            ], translation: "秦王派人对安陵君说：“我想用五百里的土地交换安陵，安陵君可要答应我！”安陵君说：“大王施与恩惠，用大换小，很好；虽然如此，但我从先王那里接受了封地，愿意始终守护它，不敢交换！”秦王不高兴。安陵君因此派唐雎出使秦国。秦王对唐雎说：“我用五百里地换安陵，安陵君不听我的，为什么？况且秦国灭了韩、魏，而安陵君仅凭五十里地存在，是因为把他看作长者，所以不打他的主意。如今我用十倍的土地，让安陵君扩大领土，他却违抗我，是轻视我吗？”唐雎回答：“不，不是这样的。安陵君从先王那里接受封地并守护它，即使千里也不敢换，何况只是五百里？”秦王勃然大怒，对唐雎说：“你听说过天子发怒吗？”唐雎说：“没听说过。”秦王说：“天子发怒，会伏尸百万，流血千里。”唐雎说：“大王听说过平民发怒吗？”秦王说：“平民发怒，不过是摘掉帽子光着脚，用头撞地罢了。”唐雎说：“这是庸人发怒，不是士人发怒。专诸刺杀王僚时，彗星袭月；聂政刺杀韩傀时，白虹贯日；要离刺杀庆忌时，苍鹰扑击殿上。这三个人，都是平民中的士人，他们心里的愤怒还没发作，上天就降下征兆，加上我将成为第四个。如果士人真的发怒，将倒下两具尸体，流血五步，天下人都要穿丧服，今天就是这样！”说着拔剑起身。秦王变了脸色，长跪着道歉说：“先生请坐！何至于此！我明白了：韩、魏灭亡，而安陵凭五十里地存在，只因为有先生您啊。”" },
            { title: "送东阳马生序", author: "宋濂", dynasty: "明", lines: [
                "余幼时即嗜学。家贫，无从致书以观，每假借于藏书之家，手自笔录，计日以还。天大寒，砚冰坚，手指不可屈伸，弗之怠。录毕，走送之，不敢稍逾约。以是人多以书假余，余因得遍观群书。既加冠，益慕圣贤之道。又患无硕师名人与游，尝趋百里外，从乡之先达执经叩问。先达德隆望尊，门人弟子填其室，未尝稍降辞色。余立侍左右，援疑质理，俯身倾耳以请；或遇其叱咄，色愈恭，礼愈至，不敢出一言以复；俟其欣悦，则又请焉。故余虽愚，卒获有所闻。",
                "当余之从师也，负箧曳屣行深山巨谷中。穷冬烈风，大雪深数尺，足肤皲裂而不知。至舍，四支僵劲不能动，媵人持汤沃灌，以衾拥覆，久而乃和。寓逆旅，主人日再食，无鲜肥滋味之享。同舍生皆被绮绣，戴朱缨宝饰之帽，腰白玉之环，左佩刀，右备容臭，烨然若神人；余则缊袍敝衣处其间，略无慕艳意，以中有足乐者，不知口体之奉不若人也。盖余之勤且艰若此。今虽耄老，未有所成，犹幸预君子之列，而承天子之宠光，缀公卿之后，日侍坐备顾问，四海亦谬称其氏名，况才之过于余者乎？",
                "今诸生学于太学，县官日有廪稍之供，父母岁有裘葛之遗，无冻馁之患矣；坐大厦之下而诵诗书，无奔走之劳矣；有司业、博士为之师，未有问而不告、求而不得者也；凡所宜有之书，皆集于此，不必若余之手录，假诸人而后见也。其业有不精、德有不成者，非天质之卑，则心不若余之专耳，岂他人之过哉？",
                "东阳马生君则，在太学已二年，流辈甚称其贤。余朝京师，生以乡人子谒余，撰长书以为贽，辞甚畅达，与之论辨，言和而色夷。自谓少时用心于学甚劳，是可谓善学者矣。其将归见其亲也，余故道为学之难以告之。谓余勉乡人以学者，余之志也；诋我夸际遇之盛而骄乡人者，岂知余者哉！"
            ], translation: "我小时候就爱好学习。家里穷，没办法买书来看，常常向藏书的人家借，亲手抄写，按约定日期归还。天气很冷，砚台里的墨汁结冰，手指不能弯曲伸直，也不放松。抄完，跑着送回去，不敢稍微超过约期。因此人们大多愿意把书借给我，我因此能博览群书。成年以后，更加仰慕圣贤的学说。又担心没有大师名人交往，曾经跑到百里外，拿着经书向同乡前辈请教。前辈德高望重，学生挤满屋子，他从不把言辞放委婉些。我在旁边站着侍候，提出疑难，询问道理，弯下身子请教；有时遇到他训斥，表情更恭敬，礼节更周到，不敢说一句话；等他高兴了，就又请教。所以我虽然愚笨，终于有所收获。当我去求师的时候，背着书箱，拖着鞋子，走在深山峡谷中。隆冬寒风，大雪几尺深，脚皮肤冻裂都不知道。到了客舍，四肢僵硬不能动，仆人拿热水给我浇洗，用被子盖上，很久才暖和。住在旅店，店主每天给两顿饭，没有鲜鱼肥肉的滋味。同屋的同学都穿着锦绣，戴着红缨珠宝装饰的帽子，腰挂白玉环，左边佩刀，右边挂香囊，光彩照人像神仙；我却穿着旧棉袍破衣服夹在他们中间，毫无羡慕之心，因为心中有足以快乐的事，不觉得吃的穿的不如别人。我勤奋艰苦就是这样。如今虽然年老，没什么成就，但还荣幸地参与君子的行列，承受皇上的恩宠，跟随在公卿之后，每天陪坐以备顾问，四海之内也错误地称道我的姓名，何况才能超过我的人呢？现在学生在太学学习，朝廷每天有米粮供应，父母每年给冬夏衣服，没有冻饿之忧了；坐在大厦里诵读诗书，没有奔走的劳苦了；有司业、博士当老师，没有问而不告、求而不得的了；凡是应有之书，都集中在这里，不必像我那样手抄，向别人借才能看到。如果学业还不精，品德还不成，不是天资低下，而是用心不如我专一罢了，难道是别人的过错吗？东阳马君则，在太学已经两年，同辈很称赞他贤能。我进京朝见，他以同乡后辈的身份拜见我，写了一封长信作为见面礼，文辞很畅达，和他谈论，言语平和脸色和悦。他自己说少年时用心学习很勤劳，这可以说是善于学习的了。他将要回家探望父母，我特意讲讲求学的艰难来告诉他。如果说我是在勉励同乡努力学习，那正是我的心意；如果诋毁我夸耀自己的遭遇而在同乡面前骄傲，那怎能了解我呢！" },
            { title: "曹刿论战", author: "《左传》", dynasty: "春秋", lines: [
                "十年春，齐师伐我。公将战，曹刿请见。其乡人曰：“肉食者谋之，又何间焉？”刿曰：“肉食者鄙，未能远谋。”乃入见。问：“何以战？”公曰：“衣食所安，弗敢专也，必以分人。”对曰：“小惠未遍，民弗从也。”公曰：“牺牲玉帛，弗敢加也，必以信。”对曰：“小信未孚，神弗福也。”公曰：“小大之狱，虽不能察，必以情。”对曰：“忠之属也，可以一战。战则请从。”",
                "公与之乘，战于长勺。公将鼓之。刿曰：“未可。”齐人三鼓。刿曰：“可矣。”齐师败绩。公将驰之。刿曰：“未可。”下视其辙，登轼而望之，曰：“可矣。”遂逐齐师。",
                "既克，公问其故。对曰：“夫战，勇气也。一鼓作气，再而衰，三而竭。彼竭我盈，故克之。夫大国，难测也，惧有伏焉。吾视其辙乱，望其旗靡，故逐之。”"
            ], translation: "鲁庄公十年春，齐国军队攻打鲁国。庄公准备迎战，曹刿请求接见。他的同乡说：“当权的人自会谋划，你又何必参与？”曹刿说：“当权的人目光短浅，不能深谋远虑。”于是进宫拜见。问庄公：“靠什么作战？”庄公说：“衣食这类养生的东西，我不敢独自享用，一定分给别人。”曹刿说：“小恩小惠不能遍及百姓，人民不会跟从。”庄公说：“祭祀用的牛羊玉帛，不敢虚报，一定对神诚实。”曹刿说：“小小诚信未能取信于神，神不会降福。”庄公说：“大大小小的案件，即使不能一一明察，一定按实情处理。”曹刿说：“这是尽了本职的事，可以凭此打一仗。作战时请让我跟从。”庄公和他同乘一辆车，在长勺作战。庄公准备击鼓。曹刿说：“还不行。”齐军击鼓三次。曹刿说：“可以了。”齐军大败。庄公准备驱车追击。曹刿说：“还不行。”下车细看齐军的车辙，登上车前横木眺望，说：“可以了。”于是追击齐军。战胜后，庄公问原因。曹刿回答：“作战靠勇气。第一次击鼓士气振作，第二次就衰弱，第三次就竭尽。对方士气耗尽而我军士气正盛，所以战胜。大国难以预测，恐怕有埋伏。我看见他们车辙混乱，旗帜倒下，所以才追击。”" },
            { title: "邹忌讽齐王纳谏", author: "《战国策》", dynasty: "西汉", lines: [
                "邹忌修八尺有余，而形貌昳丽。朝服衣冠，窥镜，谓其妻曰：“我孰与城北徐公美？”其妻曰：“君美甚，徐公何能及君也？”城北徐公，齐国之美丽者也。忌不自信，而复问其妾曰：“吾孰与徐公美？”妾曰：“徐公何能及君也？”旦日，客从外来，与坐谈，问之客曰：“吾与徐公孰美？”客曰：“徐公不若君之美也。”明日徐公来，孰视之，自以为不如；窥镜而自视，又弗如远甚。暮寝而思之，曰：“吾妻之美我者，私我也；妾之美我者，畏我也；客之美我者，欲有求于我也。”",
                "于是入朝见威王，曰：“臣诚知不如徐公美。臣之妻私臣，臣之妾畏臣，臣之客欲有求于臣，皆以美于徐公。今齐地方千里，百二十城，宫妇左右莫不私王，朝廷之臣莫不畏王，四境之内莫不有求于王：由此观之，王之蔽甚矣。”",
                "王曰：“善。”乃下令：“群臣吏民能面刺寡人之过者，受上赏；上书谏寡人者，受中赏；能谤讥于市朝，闻寡人之耳者，受下赏。”令初下，群臣进谏，门庭若市；数月之后，时时而间进；期年之后，虽欲言，无可进者。燕、赵、韩、魏闻之，皆朝于齐。此所谓战胜于朝廷。"
            ], translation: "邹忌身高八尺多，相貌光艳。早晨穿戴好衣帽，照镜子，对妻子说：“我与城北徐公谁美？”妻子说：“您美极了，徐公怎能比得上您？”城北徐公是齐国的美男子。邹忌不自信，又问妾：“我与徐公谁美？”妾说：“徐公怎能比得上您？”第二天，有客人来访，坐下交谈，问客人：“我与徐公谁美？”客人说：“徐公不如您美。”又过了一天徐公来了，邹忌仔细看他，自认为不如；再照镜子看看自己，更觉得差得远。晚上躺着想：“妻子说我美，是偏爱我；妾说我美，是怕我；客人说我美，是有求于我。”于是上朝拜见齐威王，说：“我确实知道自己不如徐公美。我的妻子偏爱我，我的妾怕我，我的客人有求于我，都说我比徐公美。如今齐国方圆千里，城池一百二十座，宫里的妃子、侍从没有不偏爱大王的，朝廷的大臣没有不害怕大王的，全国的人没有不有求于大王的：由此看来，大王受蒙蔽很深了。”威王说：“好。”于是下令：“群臣吏民能当面指出我过错的，受上等奖赏；上书劝谏我的，受中等奖赏；能在公共场所议论我的过失传到我耳中的，受下等奖赏。”命令刚下，群臣进谏，门庭若市；几个月后，还偶尔有人进谏；一年后，即使想说，也没什么可说的了。燕、赵、韩、魏听说后，都来齐国朝见。这就是在朝廷上战胜了敌国。" },
            { title: "出师表", author: "诸葛亮", dynasty: "三国", lines: [
                "臣亮言：先帝创业未半而中道崩殂，今天下三分，益州疲弊，此诚危急存亡之秋也。然侍卫之臣不懈于内，忠志之士忘身于外者，盖追先帝之殊遇，欲报之于陛下也。诚宜开张圣听，以光先帝遗德，恢弘志士之气，不宜妄自菲薄，引喻失义，以塞忠谏之路也。",
                "宫中府中，俱为一体，陟罚臧否，不宜异同。若有作奸犯科及为忠善者，宜付有司论其刑赏，以昭陛下平明之理，不宜偏私，使内外异法也。侍中侍郎郭攸之、费祎、董允等，此皆良实，志虑忠纯，是以先帝简拔以遗陛下。愚以为宫中之事，事无大小，悉以咨之，然后施行，必能裨补阙漏，有所广益。",
                "将军向宠，性行淑均，晓畅军事，试用于昔日，先帝称之曰能，是以众议举宠为督。愚以为营中之事，悉以咨之，必能使行阵和睦，优劣得所。",
                "亲贤臣，远小人，此先汉所以兴隆也；亲小人，远贤臣，此后汉所以倾颓也。先帝在时，每与臣论此事，未尝不叹息痛恨于桓、灵也。侍中、尚书、长史、参军，此悉贞良死节之臣，愿陛下亲之信之，则汉室之隆，可计日而待也。",
                "臣本布衣，躬耕于南阳，苟全性命于乱世，不求闻达于诸侯。先帝不以臣卑鄙，猥自枉屈，三顾臣于草庐之中，咨臣以当世之事，由是感激，遂许先帝以驱驰。后值倾覆，受任于败军之际，奉命于危难之间，尔来二十有一年矣。",
                "先帝知臣谨慎，故临崩寄臣以大事也。受命以来，夙夜忧叹，恐托付不效，以伤先帝之明，故五月渡泸，深入不毛。今南方已定，兵甲已足，当奖率三军，北定中原，庶竭驽钝，攘除奸凶，兴复汉室，还于旧都。此臣所以报先帝而忠陛下之职分也。至于斟酌损益，进尽忠言，则攸之、祎、允之任也。",
                "愿陛下托臣以讨贼兴复之效，不效，则治臣之罪，以告先帝之灵。若无兴德之言，则责攸之、祎、允等之慢，以彰其咎。陛下亦宜自谋，以咨诹善道，察纳雅言，深追先帝遗诏。臣不胜受恩感激。",
                "今当远离，临表涕零，不知所言。"
            ], translation: "臣诸葛亮上言：先帝开创大业未完成一半就中途去世，现在天下三分，益州疲惫，这真是危急存亡的时刻。然而侍卫大臣在内不懈怠，忠志之士在外舍生忘死，是因为追念先帝的厚遇，想报答给陛下。陛下确实应该广开言路，光大先帝遗德，振奋志士之气，不宜妄自菲薄，说话不当，堵塞忠谏之路。宫中和府中，都是一个整体，赏罚褒贬，不应不同。如有作奸犯科或忠善的，应交给有关部门评判赏罚，以显示陛下公正严明，不宜偏私，使内外执法不一。侍中侍郎郭攸之、费祎、董允等，都是善良诚实、忠心纯正的人，所以先帝选拔留给陛下。我认为宫中之事，无论大小，都咨询他们，然后施行，必能弥补缺失，有所启发。将军向宠，性情品行善良公正，通晓军事，过去试用，先帝称赞他能干，所以大家推举他为都督。我认为军营之事，都咨询他，必能使军队和睦，优劣得当。亲近贤臣，疏远小人，这是前汉兴隆的原因；亲近小人，疏远贤臣，这是后汉倾覆的原因。先帝在世时，每次与我谈论此事，没有不叹息痛恨桓、灵二帝的。侍中、尚书、长史、参军，都是坚贞可靠能以死报国的臣子，希望陛下亲近信任他们，那么汉室兴盛，可以计日而待。我本平民，在南阳种田，乱世中苟全性命，不求在诸侯中扬名。先帝不因为我卑微，屈尊三次到草庐看我，询问我当世之事，因此感激，就答应为先帝奔走效劳。后来遇到兵败，在败军之际接受重任，在危难之间奉行使命，至今已二十一年了。先帝知道我谨慎，所以临终把大事托付给我。受命以来，日夜忧虑，担心托付无成效，有损先帝英明，所以五月渡过泸水，深入不毛之地。现在南方已平定，兵甲已充足，应当激励三军，北定中原，希望能竭尽平庸之力，铲除奸凶，兴复汉室，还都洛阳。这是我报答先帝并尽忠陛下的职责。至于权衡得失，进献忠言，则是攸之、祎、允的责任。希望陛下把讨贼兴复的任务交给我，没有成效，就治我的罪，以告先帝在天之灵。如果没有兴德的建议，就责备攸之、祎、允的怠慢，揭示他们的过失。陛下也应自行谋划，咨询良策，明察采纳正言，深深追念先帝遗诏。我受恩感激不尽。现在即将远离，面对奏表落泪，不知说什么。" },
            { title: "十五从军征", author: "汉乐府", dynasty: "汉", lines: [
                "十五从军征，八十始得归。",
                "道逢乡里人：“家中有阿谁？”",
                "“遥看是君家，松柏冢累累。”",
                "兔从狗窦入，雉从梁上飞。",
                "中庭生旅谷，井上生旅葵。",
                "舂谷持作饭，采葵持作羹。",
                "羹饭一时熟，不知饴阿谁。",
                "出门东向看，泪落沾我衣。"
            ], translation: "十五岁就参军出征，八十岁才得以回家。路上遇到同乡人，问：“我家里还有谁？”远远望去那是你家，松柏林中坟墓成堆。野兔从狗洞钻进，野鸡在梁上飞。庭院中长着野谷，井台上长着野菜。舂谷来做米饭，采葵来做菜汤。汤饭一会儿熟了，却不知送给谁吃。出门向东看，泪水洒满衣裳。" },
            { title: "白雪歌送武判官归京", author: "岑参", dynasty: "唐", lines: [
                "北风卷地白草折，胡天八月即飞雪。",
                "忽如一夜春风来，千树万树梨花开。",
                "散入珠帘湿罗幕，狐裘不暖锦衾薄。",
                "将军角弓不得控，都护铁衣冷难着。",
                "瀚海阑干百丈冰，愁云惨淡万里凝。",
                "中军置酒饮归客，胡琴琵琶与羌笛。",
                "纷纷暮雪下辕门，风掣红旗冻不翻。",
                "轮台东门送君去，去时雪满天山路。",
                "山回路转不见君，雪上空留马行处。"
            ], translation: "北风席卷大地，白草折断，胡地八月就飞雪。忽然好像一夜春风吹来，千树万树梨花盛开。雪花飘进珠帘浸湿罗幕，狐皮袍不暖，锦被嫌薄。将军的角弓拉不开，都护的铁衣冷得难穿。沙漠纵横百丈冰，愁云暗淡万里凝。中军设宴送归客，胡琴琵琶羌笛合奏。傍晚辕门大雪纷飞，红旗冻住风也吹不翻。轮台东门送你离去，去时雪满天山路。山路曲折不见你，雪上空留马蹄印。" },
            { title: "过零丁洋", author: "文天祥", dynasty: "宋", lines: [
                "辛苦遭逢起一经，干戈寥落四周星。",
                "山河破碎风飘絮，身世浮沉雨打萍。",
                "惶恐滩头说惶恐，零丁洋里叹零丁。",
                "人生自古谁无死？留取丹心照汗青。"
            ], translation: "辛苦遭遇起于一经，兵荒马乱已过四年。山河破碎像风吹柳絮，身世浮沉像雨打浮萍。惶恐滩头诉说惶恐，零丁洋里叹息零丁。人生自古谁无死？留下赤诚之心照耀史册。" },
            { title: "南乡子·登京口北固亭有怀", author: "辛弃疾", dynasty: "宋", lines: [
                "何处望神州？满眼风光北固楼。",
                "千古兴亡多少事？悠悠。不尽长江滚滚流。",
                "年少万兜鍪，坐断东南战未休。",
                "天下英雄谁敌手？曹刘。生子当如孙仲谋。"
            ], translation: "什么地方能望见中原？满眼风光北固楼。千古兴亡多少事？悠远漫长。不尽长江滚滚流。年少时统率千军万马，占据东南征战不休。天下英雄谁是他的对手？曹操刘备。生儿子应当像孙仲谋那样。" },
            { title: "山坡羊·潼关怀古", author: "张养浩", dynasty: "元", lines: [
                "峰峦如聚，波涛如怒，山河表里潼关路。",
                "望西都，意踌躇。",
                "伤心秦汉经行处，宫阙万间都做了土。",
                "兴，百姓苦；亡，百姓苦。"
            ], translation: "山峰像聚集，波涛像发怒，外有黄河内有华山，潼关路险。遥望长安，心情徘徊。伤心秦汉经过的地方，万千宫殿都成了土。王朝兴起，百姓受苦；王朝灭亡，百姓也受苦。" },
            { title: "渔家傲·秋思", author: "范仲淹", dynasty: "宋", lines: [
                "塞下秋来风景异，衡阳雁去无留意。",
                "四面边声连角起，千嶂里，长烟落日孤城闭。",
                "浊酒一杯家万里，燕然未勒归无计。",
                "羌管悠悠霜满地，人不寐，将军白发征夫泪。"
            ], translation: "边塞秋天风景奇异，大雁南飞毫无留恋。四面边声连角响起，群山之中，长烟落日孤城紧闭。一杯浊酒遥寄万里，燕然未刻功无法归。羌笛悠扬寒霜满地，人不能寐，将军白发士兵流泪。" },
            { title: "江城子·密州出猎", author: "苏轼", dynasty: "宋", lines: [
                "老夫聊发少年狂，左牵黄，右擎苍，",
                "锦帽貂裘，千骑卷平冈。",
                "为报倾城随太守，亲射虎，看孙郎。",
                "酒酣胸胆尚开张，鬓微霜，又何妨！",
                "持节云中，何日遣冯唐？",
                "会挽雕弓如满月，西北望，射天狼。"
            ], translation: "我姑且抒发一下少年狂，左手牵黄犬，右臂擎苍鹰，头戴锦帽，身穿貂裘，千骑席卷平冈。为了报答全城人跟随太守，我要亲自射虎，像孙权那样。酒酣胸襟更开阔，鬓角微白，又何妨！何时派遣冯唐持节到云中？我将把雕弓拉成满月，朝着西北，射向天狼星。" },
            { title: "破阵子·为陈同甫赋壮词以寄之", author: "辛弃疾", dynasty: "宋", lines: [
                "醉里挑灯看剑，梦回吹角连营。",
                "八百里分麾下炙，五十弦翻塞外声，沙场秋点兵。",
                "马作的卢飞快，弓如霹雳弦惊。",
                "了却君王天下事，赢得生前身后名。可怜白发生！"
            ], translation: "醉里挑亮油灯看剑，梦醒时军营号角连成一片。把烤牛肉分给部下，奏起塞外悲壮的战歌，秋天在战场上检阅军队。战马像的卢一样飞快，弓箭像惊雷一样震响。完成君王收复中原的大事，赢得生前身后的美名。可叹白发已生！" },
            { title: "满江红（小住京华）", author: "秋瑾", dynasty: "清", lines: [
                "小住京华，早又是、中秋佳节。",
                "为篱下、黄花开遍，秋容如拭。",
                "四面歌残终破楚，八年风味徒思浙。",
                "苦将侬、强派作蛾眉，殊未屑！",
                "身不得，男儿列，心却比，男儿烈。",
                "算平生肝胆，因人常热。俗子胸襟谁识我？",
                "英雄末路当磨折。莽红尘，何处觅知音？青衫湿！"
            ], translation: "暂居北京，转眼又是中秋佳节。篱笆下，菊花盛开，秋色明净如洗。四面歌声渐歇，楚国终被破，八年来空自思念浙江。苦苦将我强派作女子，我十分不屑！身子虽不能进入男儿行列，心却比男儿更刚烈。算我平生肝胆，常因他人而热血沸腾。那些俗人怎能理解我？英雄在末路当受磨折。莽莽人世，何处寻找知音？泪水打湿了衣衫。" }
        ]}
    ];

    // 扁平化并保留年级信息
    let poems = [];
    poemsByGrade.forEach(gradeGroup => {
        gradeGroup.list.forEach(p => {
            poems.push({ ...p, grade: gradeGroup.grade });
        });
    });

    // 更新总数显示
    const totalSpan = document.getElementById('totalCount');
    totalSpan.innerText = poems.length + '篇';

    // 状态
    let filteredPoems = poems.slice();
    let selectedPoemId = 0;

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const readBtn = document.getElementById('readBtn');
    const transReadBtn = document.getElementById('transReadBtn');
    const poemListContainer = document.getElementById('poemListContainer');
    const poemContent = document.getElementById('poemContent');
    const translationText = document.getElementById('translationText');
    const leftFooterInfo = document.getElementById('leftFooterInfo');  // 左侧底部计数器

    function renderCharGroup(ch) {
        const isPunct = /[，。？！、；：“”‘’]/.test(ch);
        const cls = isPunct ? 'char-group punctuation' : 'char-group';
        return `<span class="${cls}">${ch}</span>`;
    }

    function displayPoemDetails(poem) {
        if (!poem) return;
        let html = `<div class="poem-title-line"><span class="title-part">${poem.title}</span><span class="author-part">${poem.dynasty} · ${poem.author}</span></div>`;
        const lines = poem.lines;
        for (let i = 0; i < lines.length; i++) {
            html += '<div class="poem-line-block">';
            const chars = Array.from(lines[i]);
            for (let j = 0; j < chars.length; j++) {
                html += renderCharGroup(chars[j]);
            }
            html += '</div>';
        }
        poemContent.innerHTML = html;
        translationText.innerText = poem.translation;
    }

    function renderList() {
        poemListContainer.innerHTML = '';
        let currentGrade = '';
        filteredPoems.forEach((poem, idx) => {
            if (poem.grade !== currentGrade) {
                currentGrade = poem.grade;
                const gradeDiv = document.createElement('div');
                gradeDiv.className = 'grade-group';
                gradeDiv.innerText = currentGrade;
                poemListContainer.appendChild(gradeDiv);
            }
            const itemDiv = document.createElement('div');
            itemDiv.className = `poem-item ${idx === selectedPoemId ? 'selected' : ''}`;
            itemDiv.dataset.index = idx;
            itemDiv.innerHTML = `<span class="poem-title">${poem.title}</span><span class="poem-author">${poem.author}</span>`;
            itemDiv.addEventListener('click', () => {
                selectedPoemId = idx;
                renderList();
                displayPoemDetails(poem);
                updateFooter();
            });
            poemListContainer.appendChild(itemDiv);
        });
        if (filteredPoems.length === 0) {
            poemListContainer.innerHTML = '<div style="padding:30px;text-align:center;color:#b7a48b;">📭 没有找到匹配篇目</div>';
            poemContent.innerHTML = '';
            translationText.innerText = '';
            leftFooterInfo.innerText = '0 篇';
        } else {
            if (selectedPoemId >= filteredPoems.length) selectedPoemId = filteredPoems.length - 1;
            displayPoemDetails(filteredPoems[selectedPoemId]);
            updateFooter();
        }
    }

    function updateFooter() {
        if (filteredPoems.length === 0) leftFooterInfo.innerText = '无匹配';
        else leftFooterInfo.innerText = `第 ${selectedPoemId + 1} 篇 / 共 ${filteredPoems.length} 篇`;
    }

    function filterPoems() {
        const kw = searchInput.value.trim().toLowerCase();
        filteredPoems = kw ? poems.filter(p => p.title.toLowerCase().includes(kw) || p.author.toLowerCase().includes(kw)) : poems.slice();
        selectedPoemId = filteredPoems.length > 0 ? 0 : -1;
        renderList();
    }

    function prevPoem() { if (filteredPoems.length) { selectedPoemId = (selectedPoemId - 1 + filteredPoems.length) % filteredPoems.length; renderList(); } }
    function nextPoem() { if (filteredPoems.length) { selectedPoemId = (selectedPoemId + 1) % filteredPoems.length; renderList(); } }

    function readOriginal() {
        if (!filteredPoems.length) return;
        const p = filteredPoems[selectedPoemId];
        const text = `${p.title}，${p.dynasty}·${p.author}。${p.lines.join('')}`;
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-CN';
        speechSynthesis.cancel();
        speechSynthesis.speak(utter);
    }

    function readTranslation() {
        if (!filteredPoems.length) return;
        const p = filteredPoems[selectedPoemId];
        const utter = new SpeechSynthesisUtterance(p.translation);
        utter.lang = 'zh-CN';
        speechSynthesis.cancel();
        speechSynthesis.speak(utter);
    }

    searchBtn.addEventListener('click', filterPoems);
    searchInput.addEventListener('keypress', e => e.key === 'Enter' && filterPoems());
    prevBtn.addEventListener('click', prevPoem);
    nextBtn.addEventListener('click', nextPoem);
    readBtn.addEventListener('click', readOriginal);
    transReadBtn.addEventListener('click', readTranslation);

    renderList();
})();
</script>
</body>
</html>
